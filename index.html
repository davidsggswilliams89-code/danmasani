<!DOCTYPE html>
<html>
<head>
<title>BOB TEXTILE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;padding-top:80px;}

.top-bar{
position:fixed;top:0;width:100%;height:45px;
background:#111;color:white;display:flex;
align-items:center;padding:0 10px;z-index:3000;
}

.admin-icon{margin-left:auto;cursor:pointer;}

.category-bar{
position:fixed;top:45px;width:100%;height:40px;
background:#222;display:flex;overflow-x:auto;
}

.category-btn{
color:white;padding:6px 14px;margin:5px;
border-radius:20px;cursor:pointer;
}
.category-btn.active{background:#25D366;}

.view{display:none;padding:10px;}
.active-view{display:block;}

.card{
background:white;border-radius:12px;
padding:10px;margin:10px 0;
}

/* ✅ NORMAL IMAGE HEIGHT RESTORED */
.carousel{
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;
}
.carousel img{
min-width:100%;
height:300px;
object-fit:cover;
scroll-snap-align:center;
border-radius:10px;
}
.carousel::-webkit-scrollbar{display:none}

/* DOTS */
.dots{text-align:center;margin-top:5px;}
.dot{
height:8px;width:8px;background:#bbb;
border-radius:50%;display:inline-block;margin:0 3px;
}
.dot.active{background:#25D366;}

.price{
background:#111;color:white;padding:10px;
text-align:center;border-radius:8px;margin-top:8px;
}

/* BUY BUTTON */
.buy-btn{
background:#25D366;color:white;
padding:12px;border:none;width:100%;
border-radius:12px;margin-top:10px;
display:flex;align-items:center;
justify-content:center;gap:8px;font-weight:bold;
cursor:pointer;
}

.admin{
display:none;position:fixed;top:0;left:0;
width:100%;height:100%;background:white;
z-index:9999;padding:10px;overflow:auto;
}

input,select{width:100%;padding:10px;margin:5px 0;}

.btn{width:100%;padding:10px;background:green;color:white;border:none;margin-top:5px;}
.del-btn{background:red;color:white;border:none;padding:6px;margin-top:5px;}
</style>
</head>

<body>

<div class="top-marquee">        
  <img src="logo.jpeg" class="logo">    <div class="marquee-wrapper">        
    <div class="marquee-text">        
      ✨ LUXURY HEAVEN ✨ Premium Fashion Store ✨ Quality Fabrics ✨        
    </div>        
  </div>    <div class="admin-icon" onclick="openAdmin()">🔒</div>        

<div class="category-bar" id="categoryBar"></div>

<!-- ABOUT -->
<div id="aboutView" class="view active-view">
<div class="card">
<h3 style="text-align:center;">Testimonials 💬</h3>
<div class="carousel" id="testimonialCarousel"></div>
<div class="dots" id="testimonialDots"></div>
<hr>
<h2>About Us</h2>
<p>BOB TEXTILE is your trusted fashion store.</p>
</div>
</div>

<!-- PRODUCTS -->
<div id="productView" class="view"></div>

<!-- ADMIN -->
<div class="admin" id="admin">

<h3>Admin Panel</h3>

<input id="pname" placeholder="Product name">
<input id="price" placeholder="Price">
<select id="category"></select>

<button class="btn" onclick="uploadImages()">Upload Images</button>
<button class="btn" onclick="saveProduct()">Save Product</button>

<hr>

<h3>Delete Products</h3>
<select id="delCat" onchange="loadAdminProducts()"></select>
<div id="adminList"></div>

<hr>

<h3>Categories</h3>
<input id="newCat" placeholder="New category">
<button class="btn" onclick="addCategory()">Add Category</button>

<select id="catDelete"></select>
<button class="del-btn" onclick="deleteCategory()">Delete Category</button>

<hr>

<h3>Testimonials</h3>
<button class="btn" onclick="uploadTestimonial()">Upload Testimonial</button>
<div id="testimonialAdminList"></div>

<hr>

<button class="del-btn" onclick="closeAdmin()">Close</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyD40daowTCCVrKr1kWI6krf9nB7OHp8mWU",
authDomain: "luxury-heaven-c24df.firebaseapp.com",
projectId: "luxury-heaven-c24df",
storageBucket: "luxury-heaven-c24df.firebasestorage.app",
messagingSenderId: "277279766368",
appId: "1:277279766368:web:2f5858b54f58d1df629005"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let products=[],categories=[],images=[],active="";
let testimonials=[],tIndex=0,tAuto;

window.openAdmin=()=>admin.style.display="block";
window.closeAdmin=()=>admin.style.display="none";

window.onload=()=>{
loadCategories();
loadProducts();
loadTestimonials();
};

/* CATEGORY */
async function loadCategories(){
categories=[];
let snap=await getDocs(collection(db,"categories"));
snap.forEach(d=>categories.push(d.data().name));

categoryBar.innerHTML="";

let about=document.createElement("div");
about.className="category-btn active";
about.innerText="ABOUT";
about.onclick=()=>show("about",about);
categoryBar.appendChild(about);

categories.forEach(c=>{
let btn=document.createElement("div");
btn.className="category-btn";
btn.innerText=c;
btn.onclick=()=>show(c,btn);
categoryBar.appendChild(btn);
});

fillAdmin();
}

function fillAdmin(){
category.innerHTML="";
delCat.innerHTML="";
catDelete.innerHTML="";
categories.forEach(c=>{
category.innerHTML+=`<option>${c}</option>`;
delCat.innerHTML+=`<option>${c}</option>`;
catDelete.innerHTML+=`<option>${c}</option>`;
});
}

window.addCategory=async()=>{
if(!newCat.value) return;
await addDoc(collection(db,"categories"),{name:newCat.value});
newCat.value="";
loadCategories();
};

window.deleteCategory=async()=>{
let snap=await getDocs(collection(db,"categories"));
snap.forEach(async d=>{
if(d.data().name===catDelete.value){
await deleteDoc(doc(db,"categories",d.id));
}
});
loadCategories();
};

/* PRODUCTS */
async function loadProducts(){
products=[];
let snap=await getDocs(collection(db,"products"));
snap.forEach(d=>products.push({id:d.id,...d.data()}));
}

function show(type,btn){
document.querySelectorAll(".category-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
active=type;

if(type==="about"){
aboutView.classList.add("active-view");
productView.classList.remove("active-view");
return;
}

aboutView.classList.remove("active-view");
productView.classList.add("active-view");
renderProducts();
}

function renderProducts(){
productView.innerHTML="";
let list=products.filter(p=>p.category===active);

list.forEach((p,i)=>{
productView.innerHTML+=`
<div class="card">

<div class="carousel car${i}">
${p.images.map(img=>`<img src="${img}">`).join("")}
</div>

<div class="dots dots${i}"></div>

<div style="text-align:center;font-weight:bold;font-size:18px;margin-top:10px;">
${p.name}
</div>

<div class="price">₦${p.price}</div>

<button class="buy-btn" onclick="buyNow(${i})">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="18">
BUY NOW
</button>

</div>`;
});

list.forEach((p,i)=>setupCarousel(i,p));
}

window.buyNow=(i)=>{
let list=products.filter(p=>p.category===active);
let p=list[i];

let car=document.querySelector(".car"+i);
let index=Math.round(car.scrollLeft/car.clientWidth);
let img=p.images[index] || p.images[0];

let msg=`Hello 👋,

I want to order this Product:

🧵 Category: ${p.category}
🛍️ Product: ${p.name}
💰 Price: ₦${p.price}

🖼️ Selected Image:
${img}

Is this available? I want to buy.`;

window.open("https://wa.me/2349114738932?text="+encodeURIComponent(msg));
};

function setupCarousel(i,p){
let car=document.querySelector(".car"+i);
let dotsBox=document.querySelector(".dots"+i);

dotsBox.innerHTML="";

p.images.forEach((_,x)=>{
let d=document.createElement("span");
d.className="dot"+(x===0?" active":"");
dotsBox.appendChild(d);
});

let dots=dotsBox.querySelectorAll(".dot");

car.addEventListener("scroll",()=>{
let index=Math.round(car.scrollLeft/car.clientWidth);
dots.forEach(d=>d.classList.remove("active"));
if(dots[index]) dots[index].classList.add("active");
});
}

/* CLOUDINARY */
window.uploadImages=()=>{
cloudinary.openUploadWidget({
cloudName:"db92r6j9z",
uploadPreset:"ummuhalti",
multiple:true
},(e,r)=>{
if(r.event==="success") images.push(r.info.secure_url);
});
};

window.saveProduct=async()=>{
await addDoc(collection(db,"products"),{
name:pname.value,
price:price.value,
category:category.value,
images:images,
date:Date.now()
});
images=[];
loadProducts();
};

/* TESTIMONIAL */
async function loadTestimonials(){
testimonials=[];
let snap=await getDocs(collection(db,"testimonials"));
snap.forEach(d=>testimonials.push({id:d.id,image:d.data().image}));
renderTestimonials();
loadTestimonialAdmin();
}

function renderTestimonials(){
testimonialCarousel.innerHTML="";
testimonialDots.innerHTML="";

testimonials.forEach((t,i)=>{
testimonialCarousel.innerHTML+=`<img src="${t.image}">`;
let d=document.createElement("span");
d.className="dot"+(i===0?" active":"");
d.onclick=()=>scrollTestimonial(i);
testimonialDots.appendChild(d);
});

scrollTestimonial(0);
startAuto();
}

function scrollTestimonial(i){
testimonialCarousel.scrollTo({left:testimonialCarousel.clientWidth*i,behavior:"smooth"});
document.querySelectorAll("#testimonialDots .dot").forEach(d=>d.classList.remove("active"));
testimonialDots.children[i].classList.add("active");
tIndex=i;
}

function startAuto(){
clearInterval(tAuto);
tAuto=setInterval(()=>{
tIndex=(tIndex+1)%testimonials.length;
scrollTestimonial(tIndex);
},4000);
}

window.uploadTestimonial=()=>{
cloudinary.openUploadWidget({
cloudName:"db92r6j9z",
uploadPreset:"ummuhalti",
multiple:true
},async(e,r)=>{
if(r.event==="success"){
await addDoc(collection(db,"testimonials"),{image:r.info.secure_url});
loadTestimonials();
}
});
};

function loadTestimonialAdmin(){
testimonialAdminList.innerHTML="";
testimonials.forEach(t=>{
testimonialAdminList.innerHTML+=`
<div>
<img src="${t.image}" width="40">
<button class="del-btn" onclick="deleteTestimonial('${t.id}')">Delete</button>
</div>`;
});
}

window.deleteTestimonial=async(id)=>{
await deleteDoc(doc(db,"testimonials",id));
loadTestimonials();
};

</script>
</body>
</html>
