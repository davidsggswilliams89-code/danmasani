<!DOCTYPE html>
<html>
<head>
<title>LUXURY HEAVEN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;padding-top:80px;}

.top-bar{
position:fixed;top:0;width:100%;height:45px;
background:#111;color:white;display:flex;
align-items:center;padding:0 10px;z-index:3000;
}

.admin-icon{margin-left:auto;cursor:pointer;}

.category-bar{
position:fixed;top:45px;width:100%;height:40px;
background:#222;display:flex;overflow-x:auto;
}

.category-btn{
color:white;padding:6px 14px;margin:5px;
border-radius:20px;cursor:pointer;
white-space:nowrap;
}
.category-btn.active{background:#25D366;}

.view{display:none;padding:10px;}
.active-view{display:block;}

.card{
background:white;border-radius:12px;
padding:10px;margin:10px 0;
}

.carousel img{
width:100%;border-radius:10px;margin-top:5px;
}

.price{
background:#111;color:white;padding:10px;
text-align:center;border-radius:8px;margin-top:8px;
}

.buy-btn{
background:#25D366;color:white;
padding:12px;border:none;width:100%;
border-radius:12px;margin-top:10px;
font-weight:bold;
}

.admin{
display:none;position:fixed;top:0;left:0;
width:100%;height:100%;background:white;
z-index:9999;padding:10px;overflow:auto;
}

input,select{width:100%;padding:10px;margin:5px 0;}

.btn{width:100%;padding:10px;background:green;color:white;border:none;margin-top:5px;}
.del-btn{background:red;color:white;border:none;padding:6px;margin-top:5px;}
</style>
</head>

<body>

<!-- TOP -->
<div class="top-bar">
LUXURY HEAVEN
<div class="admin-icon" onclick="openAdmin()">🔒</div>
</div>

<!-- CATEGORY -->
<div class="category-bar" id="categoryBar"></div>

<!-- ABOUT -->
<div id="aboutView" class="view active-view">
<div class="card">
<h2 style="text-align:center;">✨ About Luxury Heaven</h2>
<p style="text-align:center;">
Premium fashion store in Nigeria
</p>
</div>
</div>

<!-- PRODUCTS -->
<div id="productView" class="view"></div>

<!-- ADMIN -->
<div class="admin" id="admin">

<h3>ADMIN PANEL</h3>

<!-- CATEGORY -->
<h4>Add Category</h4>
<input id="newCat" placeholder="Category name">
<button class="btn" onclick="addCategory()">Add Category</button>

<h4>Delete Category</h4>
<select id="delCat"></select>
<button class="del-btn" onclick="deleteCategory()">Delete</button>

<hr>

<!-- PRODUCT -->
<h4>Add Product</h4>

<input id="pname" placeholder="Product name">
<input id="price" placeholder="Price">

<select id="pcat"></select>

<input id="img1" placeholder="Image URL 1">
<input id="img2" placeholder="Image URL 2 (optional)">
<input id="img3" placeholder="Image URL 3 (optional)">

<button class="btn" onclick="addProduct()">Save Product</button>

<hr>

<button class="del-btn" onclick="closeAdmin()">Close</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA6ZaMnWKJEvSUlJgh31tU6rj8CvuietuM",
authDomain: "bob-26647.firebaseapp.com",
projectId: "bob-26647",
storageBucket: "bob-26647.firebasestorage.app",
messagingSenderId: "468659293220",
appId: "1:468659293220:web:507832347dc70ab78ddcb1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let categories = [];
let products = [];
let active = "ABOUT";

/* ADMIN */
window.openAdmin = ()=>admin.style.display="block";
window.closeAdmin = ()=>admin.style.display="none";

/* INIT */
window.onload = async ()=>{
await loadCategories();
await loadProducts();
renderCategoryBar();
};

/* LOAD CATEGORIES */
async function loadCategories(){
categories=[];
let snap=await getDocs(collection(db,"categories"));
snap.forEach(d=>categories.push({id:d.id,...d.data()}));
}

/* LOAD PRODUCTS */
async function loadProducts(){
products=[];
let snap=await getDocs(collection(db,"products"));
snap.forEach(d=>products.push(d.data()));
}

/* CATEGORY BAR */
function renderCategoryBar(){

let bar=document.getElementById("categoryBar");
bar.innerHTML="";

/* ABOUT */
let about=document.createElement("div");
about.className="category-btn active";
about.innerText="ABOUT";
about.onclick=()=>show("ABOUT",about);
bar.appendChild(about);

/* CATEGORIES */
categories.forEach(c=>{
let btn=document.createElement("div");
btn.className="category-btn";
btn.innerText=c.name;
btn.onclick=()=>show(c.name,btn);
bar.appendChild(btn);
});

/* ADMIN DROPDOWN */
let sel=document.getElementById("pcat");
let del=document.getElementById("delCat");

sel.innerHTML="";
del.innerHTML="";

categories.forEach(c=>{
sel.innerHTML+=`<option>${c.name}</option>`;
del.innerHTML+=`<option value="${c.id}">${c.name}</option>`;
});
}

/* VIEW */
function show(type,btn){

document.querySelectorAll(".category-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

active=type;

document.getElementById("aboutView").classList.remove("active-view");
document.getElementById("productView").classList.remove("active-view");

if(type==="ABOUT"){
document.getElementById("aboutView").classList.add("active-view");
}else{
document.getElementById("productView").classList.add("active-view");
renderProducts();
}
}

/* PRODUCTS */
function renderProducts(){

let box=document.getElementById("productView");
box.innerHTML="";

let list=products.filter(p=>p.category===active);

if(list.length===0){
box.innerHTML="<p style='text-align:center'>No products</p>";
return;
}

list.forEach(p=>{
box.innerHTML+=`
<div class="card">

<div class="carousel">
${(p.images||[]).map(i=>`<img src="${i}">`).join("")}
</div>

<h3>${p.name}</h3>

<div class="price">₦${p.price}</div>

</div>`;
});
}

/* ⭐ ADD CATEGORY */
window.addCategory=async()=>{
let name=document.getElementById("newCat").value;

if(!name)return alert("Enter category");

await addDoc(collection(db,"categories"),{
name:name.trim(),
createdAt:Date.now()
});

document.getElementById("newCat").value="";
await loadCategories();
renderCategoryBar();
alert("Category added");
};

/* DELETE CATEGORY */
window.deleteCategory=async()=>{
let id=document.getElementById("delCat").value;

await deleteDoc(doc(db,"categories",id));

await loadCategories();
renderCategoryBar();
alert("Deleted");
};

/* ADD PRODUCT */
window.addProduct=async()=>{

let name=document.getElementById("pname").value;
let price=document.getElementById("price").value;
let cat=document.getElementById("pcat").value;

let img1=document.getElementById("img1").value;
let img2=document.getElementById("img2").value;
let img3=document.getElementById("img3").value;

if(!name||!price||!cat)return alert("Fill all");

await addDoc(collection(db,"products"),{
name,
price,
category:cat,
images:[img1,img2,img3].filter(Boolean),
date:Date.now()
});

alert("Product added");
document.getElementById("pname").value="";
document.getElementById("price").value="";
}

</script>

</body>
</html>
