<!DOCTYPE html>
<html>
<head>
<title>LUXURY HEAVEN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;padding-top:80px}

.top{position:fixed;top:0;width:100%;height:45px;background:#111;color:white;display:flex;align-items:center;z-index:9999}
.logo{height:45px}
.marquee{margin-left:100px;animation:move 12s linear infinite;white-space:nowrap}
@keyframes move{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}

.bar{position:fixed;top:45px;width:100%;background:#222;display:flex;overflow-x:auto}
.cat{color:white;padding:8px 12px;margin:5px;border-radius:20px;cursor:pointer}
.cat.active{background:#25D366}

.view{display:none}
.active-view{display:block}

.card{background:white;margin:10px;padding:10px;border-radius:12px}

.carousel{display:flex;overflow-x:auto;scroll-snap-type:x mandatory}
.carousel img{min-width:100%;height:320px;object-fit:cover;scroll-snap-align:center}
.carousel::-webkit-scrollbar{display:none}

.price{background:#111;color:white;text-align:center;padding:10px;margin-top:10px;border-radius:8px}

.buy{width:100%;padding:10px;background:#25D366;color:white;border:none;margin-top:10px;border-radius:10px}

.admin{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:white;z-index:99999;padding:10px;overflow:auto}

input,select{width:100%;padding:10px;margin:5px 0}

button{width:100%;padding:10px;border:none;border-radius:8px}

.green{background:green;color:white}
.red{background:red;color:white}
</style>
</head>

<body>

<!-- HEADER -->
<div class="top">
<img src="logo1.png" class="logo">
<div class="marquee">✨ LUXURY HEAVEN ✨</div>
<div style="margin-left:auto;padding:10px" onclick="openAdmin()">🔒</div>
</div>

<!-- CATEGORY -->
<div class="bar" id="bar"></div>

<!-- PRODUCT VIEW -->
<div id="view"></div>

<!-- ADMIN -->
<div class="admin" id="admin">

<h2>Admin Panel</h2>

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<select id="cat"></select>

<button class="green" onclick="upload()">Upload Images</button>
<button class="green" onclick="save()">Save Product</button>

<hr>

<h3>Categories</h3>
<input id="newCat" placeholder="New Category">
<button class="green" onclick="addCategory()">Add Category</button>

<select id="deleteCat"></select>
<button class="red" onclick="deleteCategory()">Delete Category</button>

<hr>

<h3>Testimonials</h3>
<button class="green" onclick="uploadTestimonial()">Upload Testimonial</button>

<button class="red" onclick="closeAdmin()">Close</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyD40daowTCCVrKr1kWI6krf9nB7OHp8mWU",
authDomain: "luxury-heaven-c24df.firebaseapp.com",
projectId: "luxury-heaven-c24df",
storageBucket: "luxury-heaven-c24df.firebasestorage.app",
messagingSenderId: "277279766368",
appId: "1:277279766368:web:2f5858b54f58d1df629005"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let products = [];
let categories = [];
let images = [];   // IMPORTANT FIX
let testimonials = [];

const cloudName = "db92r6j9z";
const uploadPreset = "ummuhalti";

/* ================= LOAD ================= */

window.onload = async () => {
  await loadCategories();
  await loadProducts();
};

/* ================= CATEGORY ================= */

async function loadCategories(){
  const snap = await getDocs(collection(db,"categories"));

  categories = [];

  snap.forEach(d=>{
    categories.push(d.data().name);
  });

  let bar = document.getElementById("bar");
  let sel = document.getElementById("cat");
  let del = document.getElementById("deleteCat");

  bar.innerHTML = "";
  sel.innerHTML = "";
  del.innerHTML = "";

  categories.forEach(c=>{
    bar.innerHTML += `<div class="cat" onclick="filter('${c}',this)">${c}</div>`;
    sel.innerHTML += `<option value="${c}">${c}</option>`;
    del.innerHTML += `<option value="${c}">${c}</option>`;
  });
}

/* ADD CATEGORY */
window.addCategory = async function(){
  let name = document.getElementById("newCat").value.trim();

  if(!name){
    alert("Enter category");
    return;
  }

  await addDoc(collection(db,"categories"),{name});

  document.getElementById("newCat").value="";

  alert("Category added ✔");

  loadCategories();
};

/* DELETE CATEGORY */
window.deleteCategory = async function(){
  let cat = document.getElementById("deleteCat").value;

  const snap = await getDocs(collection(db,"categories"));

  snap.forEach(async d=>{
    if(d.data().name === cat){
      await deleteDoc(doc(db,"categories",d.id));
    }
  });

  alert("Category deleted ✔");

  loadCategories();
};

/* ================= PRODUCTS ================= */

async function loadProducts(){
  const snap = await getDocs(collection(db,"products"));
  products = [];

  snap.forEach(d=>products.push(d.data()));

  render(products);
}

function render(list){
  let view = document.getElementById("view");
  view.innerHTML = "";

  list.forEach((p,i)=>{
    view.innerHTML += `
    <div class="card">
      <div class="carousel" id="car${i}">
        ${(p.images||[]).map(img=>`<img src="${img}">`).join("")}
      </div>
      <div class="price">₦ ${p.price}</div>
      <button class="buy" onclick="buyNow(${i})">BUY NOW</button>
    </div>`;
  });
}

/* BUY */
window.buyNow = function(i){
  let p = products[i];

  let msg = `Hello 👋,

🛍️ Product: ${p.name}
💰 Price: ₦${p.price}
🧵 Category: ${p.category}`;

  window.open("https://wa.me/234911473893?text="+encodeURIComponent(msg));
};

/* ================= UPLOAD PRODUCT IMAGES ================= */

window.upload = function(){
  cloudinary.openUploadWidget({
    cloudName,
    uploadPreset
  }, (error, result)=>{

    if(result?.event === "success"){
      images.push(result.info.secure_url);
      alert("Image uploaded ✔");
    }
  });
};

/* ================= SAVE PRODUCT ================= */

window.save = async function(){

  if(images.length === 0){
    alert("Upload images first");
    return;
  }

  let product = {
    name: document.getElementById("name").value,
    price: document.getElementById("price").value,
    category: document.getElementById("cat").value,
    images: images,
    date: Date.now()
  };

  await addDoc(collection(db,"products"),product);

  alert("Product uploaded successfully ✔");

  images = [];
  document.getElementById("name").value="";
  document.getElementById("price").value="";

  loadProducts();
};

/* ================= TESTIMONIAL ================= */

window.uploadTestimonial = function(){

  cloudinary.openUploadWidget({
    cloudName,
    uploadPreset
  }, async (error,result)=>{

    if(result?.event==="success"){

      await addDoc(collection(db,"testimonials"),{
        image: result.info.secure_url,
        date: Date.now()
      });

      alert("Testimonial uploaded ✔");
    }
  });
};

/* ================= ADMIN ================= */

window.openAdmin = function(){
  if(prompt("Password") === "1234"){
    document.getElementById("admin").style.display="block";
  }
};

window.closeAdmin = function(){
  document.getElementById("admin").style.display="none";
};

</script>

</body>
</html>
