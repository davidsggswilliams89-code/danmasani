<!DOCTYPE html>
<html>
<head>
<title>LUXURY HEAVEN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;padding-top:80px;}

/* TOP BAR */
.top-bar{
position:fixed;
top:0;
width:100%;
height:45px;
background:#111;
color:white;
display:flex;
align-items:center;
padding:0 10px;
z-index:3000;
overflow:hidden;
}

/* MOVING TEXT */
.marquee{
position:absolute;
left:0;
width:100%;
overflow:hidden;
white-space:nowrap;
}

.marquee span{
display:inline-block;
padding-left:100%;
animation:scrollText 12s linear infinite;
font-weight:bold;
}

@keyframes scrollText{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

/* ADMIN ICON ALWAYS ON TOP */
.admin-icon{
margin-left:auto;
cursor:pointer;
position:relative;
z-index:10;
}

/* CATEGORY */
.category-bar{
position:fixed;top:45px;width:100%;height:40px;
background:#222;display:flex;overflow-x:auto;
}

.category-btn{
color:white;padding:6px 14px;margin:5px;
border-radius:20px;cursor:pointer;white-space:nowrap;
}
.category-btn.active{background:#25D366;}

/* VIEW */
.view{display:none;padding:10px;}

.card{
background:white;border-radius:12px;
padding:10px;margin:10px 0;
}

/* PRODUCT CAROUSEL */
.carousel{
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;
height:380px;
background:#000;
border-radius:10px;
}

.carousel img{
min-width:100%;
height:100%;
object-fit:cover;
scroll-snap-align:center;
}

/* DOTS */
.dot{
display:inline-block;
width:8px;height:8px;
margin:0 3px;
border-radius:50%;
background:#bbb;
}
.dot.active{background:#25D366;}

/* PRICE */
.price{
background:#111;color:white;padding:10px;
text-align:center;border-radius:8px;margin-top:8px;
}

/* BUY BUTTON */
.buy-btn{
background:#25D366;color:white;
padding:12px;border:none;width:100%;
border-radius:12px;margin-top:10px;
display:flex;align-items:center;
justify-content:center;gap:8px;font-weight:bold;
}

/* ADMIN */
.admin{
display:none;position:fixed;top:0;left:0;
width:100%;height:100%;background:white;
z-index:9999;padding:10px;overflow:auto;
}

input,select{width:100%;padding:10px;margin:5px 0;}

.btn{width:100%;padding:10px;background:green;color:white;border:none;margin-top:5px;}
.del-btn{background:red;color:white;border:none;padding:6px;margin-top:5px;}

.preview img{
width:80px;height:80px;object-fit:cover;
margin:5px;border-radius:10px;
}

.delete-card{
display:flex;align-items:center;gap:10px;
background:#fff;padding:8px;border-radius:10px;margin:5px 0;
}

.delete-card img{
width:60px;height:60px;object-fit:cover;border-radius:8px;
}
</style>
</head>

<body>

<!-- TOP HEADER -->
<div class="top-bar">

<div class="marquee">
<span>LUXURY HEAVEN • PREMIUM FASHION • NEW COLLECTION • WHATSAPP ORDER AVAILABLE • </span>
</div>

<div class="admin-icon" id="adminBtn">🔒</div>

</div>

<!-- CATEGORY -->
<div class="category-bar" id="categoryBar"></div>

<!-- ABOUT -->
<div id="aboutView" class="view" style="display:block;">
<div class="card">

<h3 style="text-align:center;">What Our Customers Say 💬</h3>

<div class="carousel" id="testimonialCarousel"></div>
<div style="text-align:center;margin-top:5px;" id="testimonialDots"></div>

<hr>

<h2 style="text-align:center;">✨ About Luxury Heaven</h2>
<p style="text-align:center;line-height:1.7;">
Premium fashion store in Nigeria.
</p>

</div>
</div>

<!-- PRODUCTS -->
<div id="productView" class="view"></div>

<!-- ADMIN -->
<div class="admin" id="admin">

<h3>ADMIN PANEL</h3>

<h4>Add Category</h4>
<input id="newCat">
<button class="btn" id="addCatBtn">Add Category</button>

<h4>Delete Category</h4>
<select id="delCat"></select>
<button class="del-btn" id="delCatBtn">Delete Category</button>

<hr>

<h4>Add Product</h4>
<input id="pname">
<input id="price">
<select id="pcat"></select>

<button class="btn" id="uploadBtn">Upload Images</button>
<div class="preview" id="preview"></div>
<button class="btn" id="saveBtn">Save Product</button>

<hr>

<h4>Delete Products</h4>
<select id="deleteCatSelect"></select>
<div id="deleteProductBox"></div>

<hr>

<h4>Testimonials</h4>
<button class="btn" id="uploadTestBtn">Upload Testimonial</button>
<div id="testimonialBox"></div>

<hr>

<button class="del-btn" id="closeAdmin">Close</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyA6ZaMnWKJEvSUlJgh31tU6rj8CvuietuM",
authDomain:"bob-26647.firebaseapp.com",
projectId:"bob-26647"
});
const db = getFirestore(app);

let categories=[],products=[],testimonials=[];
let uploadedImages=[];
let active="ABOUT";

window.addEventListener("DOMContentLoaded", init);

async function init(){

await loadAll();
renderCategories();

adminBtn.onclick=openAdmin;
closeAdmin.onclick=()=>admin.style.display="none";

addCatBtn.onclick=addCategory;
delCatBtn.onclick=deleteCategory;
saveBtn.onclick=saveProduct;
uploadBtn.onclick=uploadImages;
uploadTestBtn.onclick=uploadTestimonial;

deleteCatSelect.onchange=loadDeleteProducts;
}

/* ADMIN */
function openAdmin(){
let p=prompt("Enter Password");
if(p==="12345"){admin.style.display="block";}
}

/* LOAD */
async function loadAll(){

categories=[];products=[];testimonials=[];

let c=await getDocs(collection(db,"categories"));
c.forEach(d=>categories.push({id:d.id,...d.data()}));

let p=await getDocs(collection(db,"products"));
p.forEach(d=>products.push({id:d.id,...d.data()}));

let t=await getDocs(collection(db,"testimonials"));
t.forEach(d=>testimonials.push({id:d.id,...d.data()}));

fillDropdowns();
renderTestimonials();
renderCarousel();
}

/* CATEGORY */
function renderCategories(){
categoryBar.innerHTML="";

let aboutBtn=document.createElement("div");
aboutBtn.className="category-btn active";
aboutBtn.innerText="ABOUT";
aboutBtn.onclick=()=>show("ABOUT",aboutBtn);
categoryBar.appendChild(aboutBtn);

categories.forEach(c=>{
let btn=document.createElement("div");
btn.className="category-btn";
btn.innerText=c.name;
btn.onclick=()=>show(c.name,btn);
categoryBar.appendChild(btn);
});
}

/* VIEW */
function show(type,btn){
document.querySelectorAll(".category-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

active=type;

if(type==="ABOUT"){
aboutView.style.display="block";
productView.style.display="none";
}else{
aboutView.style.display="none";
productView.style.display="block";
renderProducts();
}
}

/* PRODUCTS + DOTS */
function renderProducts(){

productView.innerHTML="";

let list=products.filter(p=>p.category===active);

list.forEach((p,i)=>{

productView.innerHTML+=`
<div class="card">

<div class="carousel car${i}">
${(p.images||[]).map(img=>`<img src="${img}">`).join("")}
</div>

<div style="text-align:center;margin-top:5px;" class="dots dots${i}"></div>

<h3 style="text-align:center">${p.name}</h3>

<div class="price">₦${p.price}</div>

<button class="buy-btn">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="18">
BUY NOW
</button>

</div>`;
});

list.forEach((p,i)=>setupCarousel(i,p));
}

function setupCarousel(i,p){

let car=document.querySelector(".car"+i);
let dotsBox=document.querySelector(".dots"+i);

if(!car) return;

dotsBox.innerHTML="";

(p.images||[]).forEach((_,x)=>{
let d=document.createElement("span");
d.className="dot"+(x===0?" active":"");
dotsBox.appendChild(d);
});

let dots=dotsBox.querySelectorAll(".dot");

car.addEventListener("scroll",()=>{
let index=Math.round(car.scrollLeft/car.clientWidth);
dots.forEach(d=>d.classList.remove("active"));
if(dots[index]) dots[index].classList.add("active");
});
}

/* TESTIMONIAL CAROUSEL */
function renderCarousel(){

testimonialCarousel.innerHTML="";
testimonialDots.innerHTML="";

testimonials.forEach((t,i)=>{
testimonialCarousel.innerHTML+=`<img src="${t.image}">`;

let d=document.createElement("span");
d.className="dot"+(i===0?" active":"");
testimonialDots.appendChild(d);
});

let dots=document.querySelectorAll("#testimonialDots .dot");

testimonialCarousel.addEventListener("scroll",()=>{
let index=Math.round(testimonialCarousel.scrollLeft/testimonialCarousel.clientWidth);
dots.forEach(d=>d.classList.remove("active"));
if(dots[index]) dots[index].classList.add("active");
});
}

</script>

</body>
</html>
