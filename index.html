<!DOCTYPE html>
<html>
<head>
<title>LUXURY HEAVEN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;padding-top:80px;}

.top-bar{
position:fixed;
top:0;
width:100%;
height:45px;
background:#111;
color:white;
display:flex;
align-items:center;
padding:0 10px;
z-index:3000;
overflow:hidden;
}

.marquee{
position:absolute;
left:0;
width:100%;
white-space:nowrap;
overflow:hidden;
}

.marquee span{
display:inline-block;
padding-left:100%;
animation:scrollText 12s linear infinite;
font-weight:bold;
}

@keyframes scrollText{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

.admin-icon{
margin-left:auto;
cursor:pointer;
position:relative;
z-index:10;
}

.category-bar{
position:fixed;
top:45px;
width:100%;
height:40px;
background:#222;
display:flex;
overflow-x:auto;
}

.category-btn{
color:white;
padding:6px 14px;
margin:5px;
border-radius:20px;
cursor:pointer;
white-space:nowrap;
}
.category-btn.active{background:#25D366;}

.view{display:none;padding:10px;}

.card{
background:white;
border-radius:12px;
padding:10px;
margin:10px 0;
}

.carousel{
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;
height:380px;
background:#000;
border-radius:10px;
}

.carousel img{
min-width:100%;
height:100%;
object-fit:cover;
scroll-snap-align:center;
}

.dot{
display:inline-block;
width:8px;
height:8px;
margin:0 3px;
border-radius:50%;
background:#bbb;
}
.dot.active{background:#25D366;}

.price{
background:#111;
color:white;
padding:10px;
text-align:center;
border-radius:8px;
margin-top:8px;
}

.buy-btn{
background:#25D366;
color:white;
padding:12px;
border:none;
width:100%;
border-radius:12px;
margin-top:10px;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
font-weight:bold;
}

.admin{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
z-index:9999;
padding:10px;
overflow:auto;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
}

.btn{
width:100%;
padding:10px;
background:green;
color:white;
border:none;
margin-top:5px;
}

.del-btn{
background:red;
color:white;
border:none;
padding:6px;
margin-top:5px;
}
</style>
</head>

<body>

<div class="top-bar">
<div class="marquee">
<span>LUXURY HEAVEN • PREMIUM FASHION • NEW ARRIVALS • WHATSAPP ORDER AVAILABLE • </span>
</div>

<div class="admin-icon" id="adminBtn">🔒</div>
</div>

<div class="category-bar" id="categoryBar"></div>

<!-- ABOUT -->
<div id="aboutView" class="view" style="display:block;">
<div class="card">
<h3 style="text-align:center;">What Our Customers Say 💬</h3>
<div class="carousel" id="testimonialCarousel"></div>
<div style="text-align:center;margin-top:5px;" id="testimonialDots"></div>

<hr>

<h2 style="text-align:center;">✨ About Luxury Heaven</h2>
<p style="text-align:center;">Premium fashion store in Nigeria.</p>
</div>
</div>

<!-- PRODUCTS -->
<div id="productView" class="view"></div>

<!-- ADMIN -->
<div class="admin" id="admin">

<h3>ADMIN PANEL</h3>

<h4>Add Category</h4>
<input id="newCat">
<button class="btn" id="addCatBtn">Add Category</button>

<h4>Delete Category</h4>
<select id="delCat"></select>
<button class="del-btn" id="delCatBtn">Delete Category</button>

<hr>

<h4>Add Product</h4>
<input id="pname">
<input id="price">
<select id="pcat"></select>

<button class="btn" id="uploadBtn">Upload Images</button>
<button class="btn" id="saveBtn">Save Product</button>

<hr>

<h4>Delete Products</h4>
<select id="deleteCatSelect"></select>
<div id="deleteProductBox"></div>

<hr>

<button class="del-btn" id="closeAdmin">Close</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyA6ZaMnWKJEvSUlJgh31tU6rj8CvuietuM",
authDomain:"bob-26647.firebaseapp.com",
projectId:"bob-26647"
});

const db = getFirestore(app);

let categories=[],products=[],testimonials=[];
let active="ABOUT";
let uploadedImages=[];

/* SAFE DOM INIT FIX */
window.addEventListener("DOMContentLoaded", async()=>{

await loadAll();
renderCategories();

/* FIXED EVENTS (THIS WAS BROKEN BEFORE) */
document.getElementById("adminBtn").onclick=openAdmin;
document.getElementById("closeAdmin").onclick=()=>admin.style.display="none";

document.getElementById("addCatBtn").onclick=addCategory;
document.getElementById("delCatBtn").onclick=deleteCategory;
document.getElementById("saveBtn").onclick=saveProduct;
document.getElementById("uploadBtn").onclick=uploadImages;

document.getElementById("deleteCatSelect").onchange=loadDeleteProducts;

});

/* ADMIN */
function openAdmin(){
let p=prompt("Enter Password");
if(p==="12345") admin.style.display="block";
}

/* LOAD */
async function loadAll(){
categories=[];products=[];testimonials=[];

let c=await getDocs(collection(db,"categories"));
c.forEach(d=>categories.push({id:d.id,...d.data()}));

let p=await getDocs(collection(db,"products"));
p.forEach(d=>products.push({id:d.id,...d.data()}));

let t=await getDocs(collection(db,"testimonials"));
t.forEach(d=>testimonials.push({id:d.id,...d.data()}));

fillDropdowns();
}

/* CATEGORY */
function renderCategories(){
categoryBar.innerHTML="";

let about=document.createElement("div");
about.className="category-btn active";
about.innerText="ABOUT";
about.onclick=()=>show("ABOUT",about);
categoryBar.appendChild(about);

categories.forEach(c=>{
let btn=document.createElement("div");
btn.className="category-btn";
btn.innerText=c.name;
btn.onclick=()=>show(c.name,btn);
categoryBar.appendChild(btn);
});
}

/* VIEW */
function show(type,btn){
document.querySelectorAll(".category-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

active=type;

if(type==="ABOUT"){
aboutView.style.display="block";
productView.style.display="none";
}else{
aboutView.style.display="none";
productView.style.display="block";
renderProducts();
}
}

/* PRODUCTS */
function renderProducts(){
productView.innerHTML="";
products.filter(p=>p.category===active).forEach(p=>{
productView.innerHTML+=`
<div class="card">

<div class="carousel">
${(p.images||[]).map(i=>`<img src="${i}">`).join("")}
</div>

<h3 style="text-align:center">${p.name}</h3>

<div class="price">₦${p.price}</div>

<button class="buy-btn">
BUY NOW
</button>

</div>`;
});
}

/* DROPDOWNS */
function fillDropdowns(){
pcat.innerHTML="";
delCat.innerHTML="";
deleteCatSelect.innerHTML="";

categories.forEach(c=>{
pcat.innerHTML+=`<option value="${c.name}">${c.name}</option>`;
delCat.innerHTML+=`<option value="${c.id}">${c.name}</option>`;
deleteCatSelect.innerHTML+=`<option value="${c.name}">${c.name}</option>`;
});
}

/* SIMPLE SAFE STUBS */
async function addCategory(){
await addDoc(collection(db,"categories"),{name:newCat.value});
location.reload();
}

async function deleteCategory(){
await deleteDoc(doc(db,"categories",delCat.value));
location.reload();
}

async function saveProduct(){
await addDoc(collection(db,"products"),{
name:pname.value,
price:price.value,
category:pcat.value,
images:uploadedImages
});
location.reload();
}

function uploadImages(){
uploadedImages=[];
cloudinary.openUploadWidget({
cloudName:"db92r6j9z",
uploadPreset:"ummuhalti",
multiple:true
},(e,r)=>{
if(!e && r.event==="success"){
uploadedImages.push(r.info.secure_url);
}
});
}

</script>

</body>
</html>
