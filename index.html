<!DOCTYPE html>
<html>
<head>
<title>LUXURY HEAVEN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
padding-top:80px;
}

.top-bar{
position:fixed;
top:0;
width:100%;
height:45px;
background:#111;
color:white;
display:flex;
align-items:center;
padding:0 10px;
z-index:3000;
}

.admin-icon{
margin-left:auto;
cursor:pointer;
}

.category-bar{
position:fixed;
top:45px;
width:100%;
height:40px;
background:#222;
display:flex;
overflow-x:auto;
}

.category-btn{
color:white;
padding:6px 14px;
margin:5px;
border-radius:20px;
cursor:pointer;
white-space:nowrap;
}
.category-btn.active{background:#25D366;}

.view{display:none;padding:10px;}
.active-view{display:block;}

.card{
background:white;
border-radius:12px;
padding:10px;
margin:10px 0;
}

/* 🔥 IMAGE CAROUSEL (INCREASED HEIGHT) */
.carousel{
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;
border-radius:10px;
height:380px;
}

.carousel img{
min-width:100%;
height:380px;
object-fit:cover;
scroll-snap-align:center;
border-radius:10px;
}

.carousel::-webkit-scrollbar{display:none;}

.dots{
text-align:center;
margin-top:5px;
}

.dot{
height:8px;
width:8px;
background:#bbb;
border-radius:50%;
display:inline-block;
margin:0 3px;
}

.dot.active{
background:#25D366;
}

.price{
background:#111;
color:white;
padding:10px;
text-align:center;
border-radius:8px;
margin-top:8px;
}

/* 🔥 BUY BUTTON WITH WHATSAPP STYLE */
.buy-btn{
background:#25D366;
color:white;
padding:12px;
border:none;
width:100%;
border-radius:12px;
margin-top:10px;
font-weight:bold;

display:flex;
align-items:center;
justify-content:center;
gap:8px;
}

.admin{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
z-index:9999;
padding:10px;
overflow:auto;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
}

.btn{
width:100%;
padding:10px;
background:green;
color:white;
border:none;
margin-top:5px;
}

.del-btn{
background:red;
color:white;
border:none;
padding:6px;
margin-top:5px;
}

.preview img{
width:80px;
height:80px;
object-fit:cover;
margin:5px;
border-radius:10px;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
LUXURY HEAVEN
<div class="admin-icon" onclick="openAdmin()">🔒</div>
</div>

<!-- CATEGORY BAR -->
<div class="category-bar" id="categoryBar"></div>

<!-- ABOUT -->
<div id="aboutView" class="view active-view">
<div class="card">
<h2 style="text-align:center;">✨ About Luxury Heaven</h2>
<p style="text-align:center;">
Premium fashion store in Nigeria
</p>
</div>
</div>

<!-- PRODUCTS -->
<div id="productView" class="view"></div>

<!-- ADMIN -->
<div class="admin" id="admin">

<h3>ADMIN PANEL</h3>

<h4>Add Category</h4>
<input id="newCat" placeholder="Category name">
<button class="btn" onclick="addCategory()">Add Category</button>

<h4>Delete Category</h4>
<select id="delCat"></select>
<button class="del-btn" onclick="deleteCategory()">Delete</button>

<hr>

<h4>Add Product</h4>

<input id="pname" placeholder="Product name">
<input id="price" placeholder="Price">

<select id="pcat"></select>

<button class="btn" onclick="uploadImages()">📸 Upload Images</button>

<div class="preview" id="preview"></div>

<button class="btn" onclick="saveProduct()">Save Product</button>

<hr>

<button class="del-btn" onclick="closeAdmin()">Close</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA6ZaMnWKJEvSUlJgh31tU6rj8CvuietuM",
authDomain: "bob-26647.firebaseapp.com",
projectId: "bob-26647",
storageBucket: "bob-26647.firebasestorage.app",
messagingSenderId: "468659293220",
appId: "1:468659293220:web:507832347dc70ab78ddcb1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let categories = [];
let products = [];
let uploadedImages = [];
let active = "ABOUT";

/* ADMIN */
window.openAdmin = () => admin.style.display="block";
window.closeAdmin = () => admin.style.display="none";

/* INIT */
window.onload = async () => {
await loadCategories();
await loadProducts();
renderCategoryBar();
};

/* LOAD CATEGORIES */
async function loadCategories(){
categories = [];

let snap = await getDocs(collection(db,"categories"));

snap.forEach(d=>{
categories.push({id:d.id,...d.data()});
});

let sel = document.getElementById("pcat");
let del = document.getElementById("delCat");

sel.innerHTML="";
del.innerHTML="";

categories.forEach(c=>{
sel.innerHTML += `<option>${c.name}</option>`;
del.innerHTML += `<option value="${c.id}">${c.name}</option>`;
});
}

/* LOAD PRODUCTS */
async function loadProducts(){
products = [];

let snap = await getDocs(collection(db,"products"));

snap.forEach(d=>{
let data = d.data();
products.push({
...data,
images: Array.isArray(data.images) ? data.images : []
});
});
}

/* CATEGORY BAR */
function renderCategoryBar(){

let bar = document.getElementById("categoryBar");
bar.innerHTML = "";

let about = document.createElement("div");
about.className = "category-btn active";
about.innerText = "ABOUT";
about.onclick = () => showView("ABOUT", about);
bar.appendChild(about);

categories.forEach(c=>{
let btn = document.createElement("div");
btn.className = "category-btn";
btn.innerText = c.name;
btn.onclick = () => showView(c.name, btn);
bar.appendChild(btn);
});
}

/* VIEW SWITCH */
function showView(type,btn){

document.querySelectorAll(".category-btn")
.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

active = type;

aboutView.classList.remove("active-view");
productView.classList.remove("active-view");

if(type==="ABOUT"){
aboutView.classList.add("active-view");
}else{
productView.classList.add("active-view");
renderProducts();
}
}

/* PRODUCTS WITH CAROUSEL */
function renderProducts(){

let box = document.getElementById("productView");
box.innerHTML = "";

let list = products.filter(p =>
(p.category || "").toLowerCase() === active.toLowerCase()
);

if(list.length === 0){
box.innerHTML = "<p style='text-align:center'>No products yet</p>";
return;
}

list.forEach((p,i)=>{

box.innerHTML += `
<div class="card">

<div class="carousel car${i}">
${(p.images||[]).map(img=>`<img src="${img}">`).join("")}
</div>

<div class="dots dots${i}"></div>

<h3 style="text-align:center">${p.name}</h3>

<div class="price">₦${p.price}</div>

<button class="buy-btn" onclick="buyNow(${i})">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="18">
BUY NOW
</button>

</div>
`;
});

list.forEach((p,i)=>setupCarousel(i));
}

/* BUY NOW */
window.buyNow = (i) => {

let list = products.filter(p =>
(p.category || "").toLowerCase() === active.toLowerCase()
);

let p = list[i];

let car = document.querySelector(".car"+i);
let index = Math.round(car.scrollLeft / car.clientWidth);
let img = p.images?.[index] || p.images?.[0];

let msg = `Hello 👋

I want to order:

🛍️ ${p.name}
📂 ${p.category}
💰 ₦${p.price}

🖼️ Image:
${img}`;

window.open("https://wa.me/2349114738932?text=" + encodeURIComponent(msg));
};

/* CAROUSEL DOTS */
function setupCarousel(i){

let car = document.querySelector(".car"+i);
let dotsBox = document.querySelector(".dots"+i);

if(!car) return;

dotsBox.innerHTML = "";

let imgs = car.querySelectorAll("img");

imgs.forEach((_,x)=>{
let d = document.createElement("span");
d.className = "dot" + (x===0?" active":"");
dotsBox.appendChild(d);
});

let dots = dotsBox.querySelectorAll(".dot");

car.addEventListener("scroll", () => {
let index = Math.round(car.scrollLeft / car.clientWidth);

dots.forEach(d=>d.classList.remove("active"));
if(dots[index]) dots[index].classList.add("active");
});
}

/* CLOUDINARY UPLOAD */
window.uploadImages = () => {

uploadedImages = [];

cloudinary.openUploadWidget(
{
cloudName: "db92r6j9z",
uploadPreset: "ummuhalti",
sources: ["local","camera"],
multiple: true,
resourceType: "image"
},
(error,result)=>{

if(!error && result.event==="success"){
uploadedImages.push(result.info.secure_url);

document.getElementById("preview").innerHTML =
uploadedImages.map(i=>`<img src="${i}">`).join("");
}
});
};

/* SAVE PRODUCT */
window.saveProduct = async () => {

let name = document.getElementById("pname").value;
let price = document.getElementById("price").value;
let cat = document.getElementById("pcat").value;

if(!name || !price || !cat || uploadedImages.length===0){
alert("Fill all fields");
return;
}

await addDoc(collection(db,"products"),{
name,
price,
category: cat,
images: uploadedImages,
date: Date.now()
});

alert("Saved!");

uploadedImages = [];
document.getElementById("preview").innerHTML = "";

await loadProducts();
renderCategoryBar();
};

/* CATEGORY */
window.addCategory = async () => {

let name = document.getElementById("newCat").value;

await addDoc(collection(db,"categories"),{
name,
createdAt: Date.now()
});

document.getElementById("newCat").value="";

await loadCategories();
renderCategoryBar();
};

/* DELETE */
window.deleteCategory = async () => {

let id = document.getElementById("delCat").value;

await deleteDoc(doc(db,"categories",id));

await loadCategories();
renderCategoryBar();
};

</script>

</body>
</html>
