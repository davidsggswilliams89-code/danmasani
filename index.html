<!DOCTYPE html>
<html>
<head>
<title>LUXURY HEAVEN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
padding-top:85px;
}

/* HEADER */
.top{
position:fixed;
top:0;
width:100%;
height:45px;
background:#111;
color:white;
display:flex;
align-items:center;
z-index:9999;
}

.logo{height:45px}

.marquee{
margin-left:90px;
white-space:nowrap;
animation:move 12s linear infinite;
}

@keyframes move{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

/* CATEGORY */
.bar{
position:fixed;
top:45px;
width:100%;
background:#222;
display:flex;
overflow-x:auto;
}

.cat{
color:white;
padding:8px 12px;
margin:5px;
border-radius:20px;
cursor:pointer;
}

.cat.active{background:#25D366}

/* VIEW */
.view{display:none}
.active-view{display:block}

/* CARD */
.card{
background:white;
margin:10px;
padding:10px;
border-radius:12px;
}

/* ADMIN */
.admin{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
z-index:99999;
padding:20px 12px;
overflow:auto;
display:flex;
justify-content:center;
align-items:center;
}

.form-box{
width:100%;
max-width:360px;
display:flex;
flex-direction:column;
gap:10px;
}

.form-box input,
.form-box select,
.form-box button{
width:100%;
padding:10px 14px;
border-radius:10px;
box-sizing:border-box;
font-size:14px;
}

.form-box input,
.form-box select{
border:1px solid #ccc;
}

.form-box button{
border:none;
}

.green{background:green;color:white}
.red{background:red;color:white}

.green{margin-bottom:10px}

/* LIST ITEM */
.list-item{
display:flex;
align-items:center;
gap:10px;
background:#f2f2f2;
padding:8px;
border-radius:8px;
margin-bottom:6px;
}

.list-item img{
width:40px;
height:40px;
object-fit:cover;
border-radius:6px;
}

.small-btn{
padding:6px;
font-size:12px;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="top">
<img src="logo1.png" class="logo">
<div class="marquee">✨ LUXURY HEAVEN ✨</div>
<div style="margin-left:auto;padding:10px" onclick="openAdmin()">🔒</div>
</div>

<div class="bar" id="bar"></div>
<div id="view"></div>

<!-- ADMIN -->
<div class="admin" id="admin">

<div class="form-box">

<h2 style="text-align:center;">Admin Panel</h2>

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<select id="cat"></select>

<button class="green" onclick="upload()">📷 Upload Images</button>
<button class="green" onclick="save()">💾 Save Product</button>

<hr>

<h3>Testimonials</h3>
<button class="green" onclick="uploadTestimonial()">Upload Testimonial</button>
<button class="red" onclick="deleteAllTestimonials()">Delete All</button>

<div id="testimonialList"></div>

<hr>

<button class="red" onclick="closeAdmin()">Close</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyD40daowTCCVrKr1kWI6krf9nB7OHp8mWU",
authDomain: "luxury-heaven-c24df.firebaseapp.com",
projectId: "luxury-heaven-c24df",
storageBucket: "luxury-heaven-c24df.firebasestorage.app",
messagingSenderId: "277279766368",
appId: "1:277279766368:web:2f5858b54f58d1df629005"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* GLOBALS */
let testimonials=[];
let testimonialIds=[];
let images=[];

/* LOAD TESTIMONIALS */
async function loadTestimonials(){

const snap = await getDocs(collection(db,"testimonials"));

testimonials=[];
testimonialIds=[];

snap.forEach(d=>{
testimonials.push(d.data().image);
testimonialIds.push(d.id);
});

renderTestimonials();
}

/* RENDER */
function renderTestimonials(){

let box=document.getElementById("testimonialList");
if(!box) return;

box.innerHTML="";

testimonials.forEach((img,i)=>{
box.innerHTML+=`
<div class="list-item">
  <img src="${img}">
  <div style="flex:1">Testimonial ${i+1}</div>
  <button class="small-btn red" onclick="deleteTestimonial(${i})">Delete</button>
</div>`;
});
}

/* DELETE SINGLE TESTIMONIAL */
window.deleteTestimonial = async function(i){

await deleteDoc(doc(db,"testimonials",testimonialIds[i]));

alert("Testimonial deleted ✔");

loadTestimonials();
};

/* DELETE ALL */
window.deleteAllTestimonials = async function(){

const snap = await getDocs(collection(db,"testimonials"));

snap.forEach(async d=>{
await deleteDoc(doc(db,"testimonials",d.id));
});

alert("All testimonials deleted ✔");

loadTestimonials();
};

/* UPLOAD TESTIMONIAL */
window.uploadTestimonial = function(){

cloudinary.openUploadWidget({
cloudName:"db92r6j9z",
uploadPreset:"ummuhalti"
},async(e,r)=>{

if(r?.event==="success"){

await addDoc(collection(db,"testimonials"),{
image:r.info.secure_url,
date:Date.now()
});

alert("Testimonial added ✔");

loadTestimonials();
}

});
};

/* ADMIN OPEN */
window.openAdmin=function(){
if(prompt("Password")==="1234"){
admin.style.display="flex";
loadTestimonials(); // IMPORTANT FIX
}
};

window.closeAdmin=function(){
admin.style.display="none";
};

</script>

</body>
</html>
