<!DOCTYPE html>
<html>
<head>
<title>LUXURY HEAVEN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
padding-top:80px;
}

.top-bar{
position:fixed;
top:0;
width:100%;
height:45px;
background:#111;
color:white;
display:flex;
align-items:center;
padding:0 10px;
z-index:3000;
}

.admin-icon{
margin-left:auto;
cursor:pointer;
}

.category-bar{
position:fixed;
top:45px;
width:100%;
height:40px;
background:#222;
display:flex;
overflow-x:auto;
}

.category-btn{
color:white;
padding:6px 14px;
margin:5px;
border-radius:20px;
cursor:pointer;
white-space:nowrap;
}
.category-btn.active{background:#25D366;}

.view{display:none;padding:10px;}
.active-view{display:block;}

.card{
background:white;
border-radius:12px;
padding:10px;
margin:10px 0;
}

/* 🔥 FIX IMAGE NO CROPPING */
.carousel{
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;
border-radius:10px;
height:380px;
}

.carousel img{
min-width:100%;
height:380px;
object-fit:contain; /* ✅ FIX: no cropping */
background:black;
scroll-snap-align:center;
border-radius:10px;
}

.carousel::-webkit-scrollbar{display:none;}

.dots{
text-align:center;
margin-top:5px;
}

.dot{
height:8px;
width:8px;
background:#bbb;
border-radius:50%;
display:inline-block;
margin:0 3px;
}

.dot.active{background:#25D366;}

.price{
background:#111;
color:white;
padding:10px;
text-align:center;
border-radius:8px;
margin-top:8px;
}

.buy-btn{
background:#25D366;
color:white;
padding:12px;
border:none;
width:100%;
border-radius:12px;
margin-top:10px;
font-weight:bold;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
}

.admin{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
z-index:9999;
padding:10px;
overflow:auto;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
}

.btn{
width:100%;
padding:10px;
background:green;
color:white;
border:none;
margin-top:5px;
}

.del-btn{
background:red;
color:white;
border:none;
padding:6px;
margin-top:5px;
}

.preview img{
width:80px;
height:80px;
object-fit:cover;
margin:5px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="top-bar">
LUXURY HEAVEN
<div class="admin-icon" onclick="openAdmin()">🔒</div>
</div>

<div class="category-bar" id="categoryBar"></div>

<!-- ABOUT -->
<div id="aboutView" class="view active-view">
<div class="card">
<h2 style="text-align:center;">✨ About Luxury Heaven</h2>
<p style="text-align:center;">Premium fashion store in Nigeria</p>
</div>
</div>

<!-- PRODUCTS -->
<div id="productView" class="view"></div>

<!-- ADMIN -->
<div class="admin" id="admin">

<h3>ADMIN PANEL</h3>

<!-- CATEGORY -->
<h4>Add Category</h4>
<input id="newCat" placeholder="Category name">
<button class="btn" onclick="addCategory()">Add Category</button>

<h4>Delete Category</h4>
<select id="delCat"></select>
<button class="del-btn" onclick="deleteCategory()">Delete</button>

<hr>

<!-- PRODUCT -->
<h4>Add Product</h4>

<input id="pname" placeholder="Product name">
<input id="price" placeholder="Price">
<select id="pcat"></select>

<button class="btn" onclick="uploadImages()">Upload Images</button>
<div class="preview" id="preview"></div>
<button class="btn" onclick="saveProduct()">Save Product</button>

<h4>Delete Product</h4>
<select id="delProduct"></select>
<button class="del-btn" onclick="deleteProduct()">Delete Product</button>

<hr>

<!-- TESTIMONIAL -->
<h4>Add Testimonial</h4>
<input id="ttext" placeholder="Customer review">
<button class="btn" onclick="addTestimonial()">Add Testimonial</button>

<h4>Delete Testimonial</h4>
<select id="delTestimonial"></select>
<button class="del-btn" onclick="deleteTestimonial()">Delete Testimonial</button>

<hr>

<button class="del-btn" onclick="closeAdmin()">Close</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA6ZaMnWKJEvSUlJgh31tU6rj8CvuietuM",
authDomain: "bob-26647.firebaseapp.com",
projectId: "bob-26647",
storageBucket: "bob-26647.firebasestorage.app",
messagingSenderId: "468659293220",
appId: "1:468659293220:web:507832347dc70ab78ddcb1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let categories=[],products=[],testimonials=[];
let uploadedImages=[];
let active="ABOUT";

/* ADMIN */
window.openAdmin=()=>admin.style.display="block";
window.closeAdmin=()=>admin.style.display="none";

/* INIT */
window.onload=async()=>{
await loadAll();
renderCategoryBar();
};

/* LOAD ALL */
async function loadAll(){
categories=[];products=[];testimonials=[];

let c=await getDocs(collection(db,"categories"));
c.forEach(d=>categories.push({id:d.id,...d.data()}));

let p=await getDocs(collection(db,"products"));
p.forEach(d=>products.push({id:d.id,...d.data(),images:Array.isArray(d.data().images)?d.data().images:[]}));

let t=await getDocs(collection(db,"testimonials"));
t.forEach(d=>testimonials.push({id:d.id,...d.data()}));

fillAdmin();
}

/* CATEGORY BAR */
function renderCategoryBar(){
let bar=document.getElementById("categoryBar");
bar.innerHTML="";

let about=document.createElement("div");
about.className="category-btn active";
about.innerText="ABOUT";
about.onclick=()=>show("ABOUT",about);
bar.appendChild(about);

categories.forEach(c=>{
let btn=document.createElement("div");
btn.className="category-btn";
btn.innerText=c.name;
btn.onclick=()=>show(c.name,btn);
bar.appendChild(btn);
});
}

/* VIEW */
function show(type,btn){
document.querySelectorAll(".category-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

active=type;

aboutView.classList.remove("active-view");
productView.classList.remove("active-view");

if(type==="ABOUT"){
aboutView.classList.add("active-view");
}else{
productView.classList.add("active-view");
renderProducts();
}
}

/* PRODUCTS */
function renderProducts(){

let box=document.getElementById("productView");
box.innerHTML="";

let list=products.filter(p=>(p.category||"").toLowerCase()===active.toLowerCase());

list.forEach((p,i)=>{
box.innerHTML+=`
<div class="card">

<div class="carousel car${i}">
${(p.images||[]).map(img=>`<img src="${img}">`).join("")}
</div>

<div class="dots dots${i}"></div>

<h3 style="text-align:center">${p.name}</h3>

<div class="price">₦${p.price}</div>

<button class="buy-btn">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="18">
BUY NOW
</button>

</div>`;
});

list.forEach((p,i)=>setupCarousel(i));
}

/* CAROUSEL */
function setupCarousel(i){
let car=document.querySelector(".car"+i);
let dotsBox=document.querySelector(".dots"+i);
if(!car)return;

dotsBox.innerHTML="";
let imgs=car.querySelectorAll("img");

imgs.forEach((_,x)=>{
let d=document.createElement("span");
d.className="dot"+(x===0?" active":"");
dotsBox.appendChild(d);
});

let dots=dotsBox.querySelectorAll(".dot");

car.addEventListener("scroll",()=>{
let index=Math.round(car.scrollLeft/car.clientWidth);
dots.forEach(d=>d.classList.remove("active"));
if(dots[index])dots[index].classList.add("active");
});
}

/* CLOUDINARY */
window.uploadImages=()=>{
uploadedImages=[];
cloudinary.openUploadWidget({
cloudName:"db92r6j9z",
uploadPreset:"ummuhalti",
sources:["local","camera"],
multiple:true,
resourceType:"image"
},(e,r)=>{
if(!e&&r.event==="success"){
uploadedImages.push(r.info.secure_url);
document.getElementById("preview").innerHTML=
uploadedImages.map(i=>`<img src="${i}">`).join("");
}
});
};

/* SAVE PRODUCT */
window.saveProduct=async()=>{
await addDoc(collection(db,"products"),{
name:pname.value,
price:price.value,
category:pcat.value,
images:uploadedImages,
date:Date.now()
});
alert("Saved");
await loadAll();
};

/* ADD CATEGORY */
window.addCategory=async()=>{
await addDoc(collection(db,"categories"),{name:newCat.value});
newCat.value="";
await loadAll();
renderCategoryBar();
};

/* DELETE PRODUCT */
window.deleteProduct=async()=>{
await deleteDoc(doc(db,"products",delProduct.value));
await loadAll();
};

/* TESTIMONIAL */
window.addTestimonial=async()=>{
await addDoc(collection(db,"testimonials"),{text:ttext.value});
ttext.value="";
await loadAll();
};

window.deleteTestimonial=async()=>{
await deleteDoc(doc(db,"testimonials",delTestimonial.value));
await loadAll();
};

/* ADMIN FILL */
function fillAdmin(){
delCat.innerHTML="";
pcat.innerHTML="";
delProduct.innerHTML="";
delTestimonial.innerHTML="";

categories.forEach(c=>{
delCat.innerHTML+=`<option value="${c.id}">${c.name}</option>`;
pcat.innerHTML+=`<option>${c.name}</option>`;
});

products.forEach(p=>{
delProduct.innerHTML+=`<option value="${p.id}">${p.name}</option>`;
});

testimonials.forEach(t=>{
delTestimonial.innerHTML+=`<option value="${t.id}">${t.text}</option>`;
});
}

</script>

</body>
</html>
