<!DOCTYPE html>
<html>
<head>
<title>HALAL TEXTILE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;padding-top:90px;}

.top-bar{
position:fixed;top:0;width:100%;height:45px;
background:#111;color:white;display:flex;
align-items:center;padding:0 10px;z-index:3000;
}

.admin-icon{margin-left:auto;cursor:pointer;}

.category-bar{
position:fixed;top:45px;width:100%;height:40px;
background:#222;display:flex;overflow-x:auto;
}

.category-btn{
color:white;padding:6px 14px;margin:5px;
border-radius:20px;cursor:pointer;
white-space:nowrap;
}
.category-btn.active{background:#25D366;}

.view{display:none;padding:10px;}
.active-view{display:block;}

.card{
background:white;border-radius:12px;
padding:10px;margin:10px 0;
}

.carousel{
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;
}
.carousel img{
min-width:100%;
height:300px;
object-fit:cover;
scroll-snap-align:center;
border-radius:10px;
}
.carousel::-webkit-scrollbar{display:none}

.price{
background:#111;color:white;padding:10px;
text-align:center;border-radius:8px;margin-top:8px;
}

.buy-btn{
background:#25D366;color:white;
padding:12px;border:none;width:100%;
border-radius:12px;margin-top:10px;
font-weight:bold;
cursor:pointer;
}

.admin{
display:none;position:fixed;top:0;left:0;
width:100%;height:100%;background:white;
z-index:9999;padding:10px;overflow:auto;
}

input,select{width:100%;padding:10px;margin:5px 0;}

.btn{width:100%;padding:10px;background:green;color:white;border:none;margin-top:5px;}
.del-btn{background:red;color:white;border:none;padding:6px;margin-top:5px;}
</style>
</head>

<body>

<div class="top-bar">
HALAL TEXTILE
<div class="admin-icon" onclick="openAdmin()">🔒</div>
</div>

<div class="category-bar" id="categoryBar"></div>

<!-- ABOUT VIEW -->
<div id="aboutView" class="view active-view">
<div class="card">

<h2 style="text-align:center;">✨ About HALAL TEXTILE</h2>

<p style="text-align:center;line-height:1.6;">
<strong>HALAL TEXTILE</strong> is your trusted online fashion store in Nigeria.
We sell shoes, bags, abayas, hijabs, and more at affordable prices.
</p>

</div>
</div>

<!-- PRODUCTS VIEW -->
<div id="productView" class="view"></div>

<!-- ADMIN -->
<div class="admin" id="admin">

<h3>Admin Panel</h3>

<input id="pname" placeholder="Product name">
<input id="price" placeholder="Price">
<select id="category"></select>

<button class="btn" onclick="saveProduct()">Save Product</button>

<hr>

<h3>Products</h3>
<div id="adminProducts"></div>

<hr>

<button class="del-btn" onclick="closeAdmin()">Close</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA6ZaMnWKJEvSUlJgh31tU6rj8CvuietuM",
authDomain: "bob-26647.firebaseapp.com",
projectId: "bob-26647",
storageBucket: "bob-26647.firebasestorage.app",
messagingSenderId: "468659293220",
appId: "1:468659293220:web:507832347dc70ab78ddcb1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let products = [];
let categories = [];
let activeCategory = "ABOUT";

/* NAV CONTROL */
window.openAdmin = () => admin.style.display="block";
window.closeAdmin = () => admin.style.display="none";

/* LOAD ON START */
window.onload = () => {
loadCategories();
loadProducts();
};

/* CATEGORY LOAD */
async function loadCategories(){
categories = [];

let snap = await getDocs(collection(db,"categories"));
snap.forEach(d => categories.push(d.data().name));

categoryBar.innerHTML = "";

/* ABOUT BUTTON */
let aboutBtn = document.createElement("div");
aboutBtn.className = "category-btn active";
aboutBtn.innerText = "ABOUT";
aboutBtn.onclick = () => showCategory("ABOUT", aboutBtn);
categoryBar.appendChild(aboutBtn);

/* OTHER CATEGORIES */
categories.forEach(c=>{
let btn = document.createElement("div");
btn.className = "category-btn";
btn.innerText = c;
btn.onclick = () => showCategory(c, btn);
categoryBar.appendChild(btn);
});
}

/* PRODUCTS LOAD */
async function loadProducts(){
products = [];

let snap = await getDocs(collection(db,"products"));
snap.forEach(d => products.push({id:d.id,...d.data()}));

renderAdminProducts();
}

/* CATEGORY SWITCH FIX */
window.showCategory = (cat, btn) => {

document.querySelectorAll(".category-btn")
.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");
activeCategory = cat;

if(cat === "ABOUT"){
aboutView.classList.add("active-view");
productView.classList.remove("active-view");
return;
}

aboutView.classList.remove("active-view");
productView.classList.add("active-view");

renderProducts();
};

/* PRODUCT RENDER */
function renderProducts(){
productView.innerHTML = "";

let list = products.filter(p => p.category === activeCategory);

list.forEach(p=>{
productView.innerHTML += `
<div class="card">
<b>${p.name}</b>

<div class="price">₦${p.price}</div>

<button class="buy-btn">
BUY NOW
</button>
</div>
`;
});
}

/* ADMIN DELETE */
window.deleteProduct = async (id) => {
await deleteDoc(doc(db,"products",id));
loadProducts();
};

/* ADMIN LIST */
window.renderAdminProducts = () => {
let box = document.getElementById("adminProducts");
box.innerHTML = "";

products.forEach(p=>{
box.innerHTML += `
<div class="card">
<b>${p.name}</b><br>
₦${p.price}<br>
<small>${p.category}</small><br>

<button class="del-btn" onclick="deleteProduct('${p.id}')">
DELETE
</button>
</div>
`;
});
};

</script>

</body>
</html>
