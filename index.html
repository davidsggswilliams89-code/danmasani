<!DOCTYPE html>
<html>
<head>
<title>LUXURY HEAVEN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;padding-top:80px;}

.top-bar{
position:fixed;top:0;width:100%;height:45px;
background:#111;color:white;display:flex;
align-items:center;padding:0 10px;z-index:3000;
}

.admin-icon{margin-left:auto;cursor:pointer;z-index:9999;}

.category-bar{
position:fixed;top:45px;width:100%;height:40px;
background:#222;display:flex;overflow-x:auto;
}

.category-btn{
color:white;padding:6px 14px;margin:5px;
border-radius:20px;cursor:pointer;white-space:nowrap;
}
.category-btn.active{background:#25D366;}

.view{display:none;padding:10px;}

.card{
background:white;border-radius:12px;
padding:10px;margin:10px 0;
}

/* CAROUSEL */
.carousel{
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;
height:380px;
background:#000;
border-radius:10px;
}

.carousel img{
min-width:100%;
height:100%;
object-fit:cover;
scroll-snap-align:center;
}

/* DOTS */
.dot{
width:8px;height:8px;
border-radius:50%;
background:#bbb;
display:inline-block;
margin:0 3px;
}
.dot.active{background:#25D366;}

/* PRICE */
.price{
background:#111;color:white;
padding:10px;text-align:center;
border-radius:8px;margin-top:8px;
}

/* BUY */
.buy-btn{
background:#25D366;color:white;
padding:12px;border:none;width:100%;
border-radius:12px;margin-top:10px;
display:flex;align-items:center;
justify-content:center;gap:8px;font-weight:bold;
}

/* ADMIN */
.admin{
display:none;
position:fixed;top:0;left:0;
width:100%;height:100%;
background:white;
z-index:99999;
padding:10px;
overflow:auto;
}

input,select{width:100%;padding:10px;margin:5px 0;}

.btn{
width:100%;padding:10px;
background:green;color:white;border:none;margin-top:5px;
}

.del-btn{
background:red;color:white;border:none;padding:6px;margin-top:5px;
}
</style>
</head>

<body>

<div class="top-bar">
<div>LUXURY HEAVEN</div>
<div class="admin-icon" id="adminBtn">🔒</div>
</div>

<div class="category-bar" id="categoryBar"></div>

<!-- ABOUT -->
<div id="aboutView" class="view" style="display:block;">
<div class="card">
<h3 style="text-align:center;">About Luxury Heaven</h3>
<p style="text-align:center;">Premium fashion store</p>
</div>
</div>

<!-- PRODUCTS -->
<div id="productView" class="view"></div>

<!-- ADMIN -->
<div class="admin" id="admin">

<h3>ADMIN PANEL</h3>

<input id="newCat" placeholder="Category">
<button class="btn" id="addCatBtn">Add Category</button>

<select id="delCat"></select>
<button class="del-btn" id="delCatBtn">Delete Category</button>

<hr>

<input id="pname" placeholder="Product name">
<input id="price" placeholder="Price">
<select id="pcat"></select>

<button class="btn" id="uploadBtn">Upload Images</button>
<button class="btn" id="saveBtn">Save Product</button>

<hr>

<button class="del-btn" id="closeAdmin">Close</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyA6ZaMnWKJEvSUlJgh31tU6rj8CvuietuM",
authDomain:"bob-26647.firebaseapp.com",
projectId:"bob-26647"
});

const db = getFirestore(app);

let categories=[],products=[];
let active="ABOUT";
let uploadedImages=[];

/* SAFE INIT */
window.addEventListener("DOMContentLoaded", async ()=>{

await loadData();
renderCategories();

/* ADMIN */
adminBtn.onclick=()=>{
let p=prompt("Password");
if(p==="12345") admin.style.display="block";
};

closeAdmin.onclick=()=>admin.style.display="none";

addCatBtn.onclick=addCategory;
delCatBtn.onclick=deleteCategory;
saveBtn.onclick=saveProduct;
uploadBtn.onclick=uploadImages;

});

/* LOAD */
async function loadData(){
categories=[];products=[];

let c=await getDocs(collection(db,"categories"));
c.forEach(d=>categories.push({id:d.id,...d.data()}));

let p=await getDocs(collection(db,"products"));
p.forEach(d=>products.push({id:d.id,...d.data()}));

fill();
}

/* CATEGORY */
function renderCategories(){
categoryBar.innerHTML="";

let about=document.createElement("div");
about.className="category-btn active";
about.innerText="ABOUT";
about.onclick=()=>switchView("ABOUT",about);
categoryBar.appendChild(about);

categories.forEach(c=>{
let btn=document.createElement("div");
btn.className="category-btn";
btn.innerText=c.name;
btn.onclick=()=>switchView(c.name,btn);
categoryBar.appendChild(btn);
});
}

/* VIEW */
function switchView(type,btn){
document.querySelectorAll(".category-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

active=type;

if(type==="ABOUT"){
aboutView.style.display="block";
productView.style.display="none";
}else{
aboutView.style.display="none";
productView.style.display="block";
renderProducts();
}
}

/* PRODUCTS + DOT FIX */
function renderProducts(){

productView.innerHTML="";

let list=products.filter(p=>p.category===active);

list.forEach((p,i)=>{

productView.innerHTML+=`
<div class="card">

<div class="carousel car${i}">
${(p.images||[]).map(img=>`<img src="${img}">`).join("")}
</div>

<div style="text-align:center;margin-top:5px;" class="dots dots${i}"></div>

<h3 style="text-align:center">${p.name}</h3>

<div class="price">₦${p.price}</div>

<button class="buy-btn">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="18">
BUY NOW
</button>

</div>`;
});

list.forEach((p,i)=>setupDots(i,p));
}

/* DOT SYSTEM */
function setupDots(i,p){

let car=document.querySelector(".car"+i);
let dotsBox=document.querySelector(".dots"+i);

if(!car) return;

dotsBox.innerHTML="";

(p.images||[]).forEach((_,x)=>{
let d=document.createElement("span");
d.className="dot"+(x===0?" active":"");
dotsBox.appendChild(d);
});

let dots=dotsBox.querySelectorAll(".dot");

car.addEventListener("scroll",()=>{
let index=Math.round(car.scrollLeft/car.clientWidth);
dots.forEach(d=>d.classList.remove("active"));
if(dots[index]) dots[index].classList.add("active");
});
}

/* BASIC FIREBASE OPS */
async function addCategory(){
await addDoc(collection(db,"categories"),{name:newCat.value});
location.reload();
}

async function deleteCategory(){
await deleteDoc(doc(db,"categories",delCat.value));
location.reload();
}

async function saveProduct(){
await addDoc(collection(db,"products"),{
name:pname.value,
price:price.value,
category:pcat.value,
images:uploadedImages
});
location.reload();
}

function uploadImages(){
uploadedImages=[];
cloudinary.openUploadWidget({
cloudName:"db92r6j9z",
uploadPreset:"ummuhalti",
multiple:true
},(e,r)=>{
if(!e && r.event==="success"){
uploadedImages.push(r.info.secure_url);
}
});
}

</script>

</body>
</html>
