<!DOCTYPE html>
<html>
<head>
<title>LUXURY HEAVEN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
padding-top:85px;
}

/* HEADER */
.top{
position:fixed;
top:0;
width:100%;
height:45px;
background:#111;
color:white;
display:flex;
align-items:center;
z-index:9999;
}

.logo{height:45px}

.marquee{
margin-left:90px;
white-space:nowrap;
animation:move 12s linear infinite;
}

@keyframes move{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

/* CATEGORY BAR */
.bar{
position:fixed;
top:45px;
width:100%;
background:#222;
display:flex;
overflow-x:auto;
z-index:9998;
}

.cat{
color:white;
padding:8px 14px;
margin:5px;
border-radius:20px;
cursor:pointer;
white-space:nowrap;
font-size:13px;
}

.cat.active{
background:#25D366;
}

/* VIEW */
.view{display:none}
.active-view{display:block}

/* CARD */
.card{
background:white;
margin:10px;
padding:10px;
border-radius:12px;
}

/* ADMIN */
.admin{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
z-index:99999;

/* CENTER FIX */
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.form-box{
width:100%;
max-width:360px;
display:flex;
flex-direction:column;
gap:10px;
}

/* INPUT + BUTTON BALANCE FIX */
.form-box input,
.form-box select,
.form-box button{
width:100%;
padding:10px 12px;
border-radius:10px;
box-sizing:border-box;
font-size:14px;
}

.form-box input,
.form-box select{
border:1px solid #ccc;
}

/* SMALLER RIGHT SPACE LOOK FIX */
.form-box button{
border:none;
margin:0;
}

.green{background:green;color:white}
.red{background:red;color:white}

/* spacing between groups */
.section-gap{
margin-top:8px;
margin-bottom:8px;
}

/* TESTIMONIAL LIST */
.list-item{
display:flex;
align-items:center;
gap:10px;
background:#f2f2f2;
padding:8px;
border-radius:8px;
margin-bottom:6px;
}

.list-item img{
width:40px;
height:40px;
object-fit:cover;
border-radius:6px;
}

.small-btn{
padding:6px;
font-size:12px;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="top">
<img src="logo1.png" class="logo">
<div class="marquee">✨ LUXURY HEAVEN ✨</div>
<div style="margin-left:auto;padding:10px" onclick="openAdmin()">🔒</div>
</div>

<!-- CATEGORY BAR (RESTORED) -->
<div class="bar" id="bar"></div>

<!-- PRODUCT VIEW -->
<div id="view"></div>

<!-- ADMIN -->
<div class="admin" id="admin">

<div class="form-box">

<h2 style="text-align:center;">Admin Panel</h2>

<!-- PRODUCT -->
<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<select id="cat"></select>

<button class="green section-gap" onclick="upload()">📷 Upload Images</button>
<button class="green" onclick="save()">💾 Save Product</button>

<hr>

<!-- TESTIMONIAL -->
<h3>Testimonials</h3>
<button class="green" onclick="uploadTestimonial()">Upload Testimonial</button>
<button class="red" onclick="deleteAllTestimonials()">Delete All</button>

<div id="testimonialList"></div>

<hr>

<!-- CATEGORY -->
<h3>Categories</h3>

<input id="newCat" placeholder="New Category">
<button class="green" onclick="addCategory()">Add Category</button>

<select id="deleteCat"></select>
<button class="red" onclick="deleteCategory()">Delete Category</button>

<hr>

<button class="red" onclick="closeAdmin()">Close</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyD40daowTCCVrKr1kWI6krf9nB7OHp8mWU",
authDomain: "luxury-heaven-c24df.firebaseapp.com",
projectId: "luxury-heaven-c24df",
storageBucket: "luxury-heaven-c24df.firebasestorage.app",
messagingSenderId: "277279766368",
appId: "1:277279766368:web:2f5858b54f58d1df629005"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let categories=[];
let products=[];
let images=[];
let testimonials=[];
let testimonialIds=[];

/* INIT */
window.onload=async()=>{
await loadCategories();
await loadProducts();
loadTestimonials();
};

/* ================= CATEGORY (RESTORED) ================= */
async function loadCategories(){

const snap = await getDocs(collection(db,"categories"));

categories=[];

snap.forEach(d=>{
categories.push(d.data().name);
});

let bar=document.getElementById("bar");
let sel=document.getElementById("cat");
let del=document.getElementById("deleteCat");

bar.innerHTML="";
sel.innerHTML="";
del.innerHTML="";

categories.forEach(c=>{

bar.innerHTML+=`<div class="cat">${c}</div>`;

sel.innerHTML+=`<option value="${c}">${c}</option>`;
del.innerHTML+=`<option value="${c}">${c}</option>`;
});

}

/* ================= PRODUCTS ================= */
async function loadProducts(){

const snap = await getDocs(collection(db,"products"));

products=[];
snap.forEach(d=>{
products.push(d.data());
});
}

/* ================= TESTIMONIAL ================= */
async function loadTestimonials(){

const snap = await getDocs(collection(db,"testimonials"));

testimonials=[];
testimonialIds=[];

snap.forEach(d=>{
testimonials.push(d.data().image);
testimonialIds.push(d.id);
});

renderTestimonials();
}

function renderTestimonials(){

let box=document.getElementById("testimonialList");
if(!box) return;

box.innerHTML="";

testimonials.forEach((img,i)=>{
box.innerHTML+=`
<div class="list-item">
  <img src="${img}">
  <div style="flex:1">Testimonial ${i+1}</div>
  <button class="small-btn red" onclick="deleteTestimonial(${i})">Delete</button>
</div>`;
});
}

/* DELETE SINGLE TESTIMONIAL */
window.deleteTestimonial = async function(i){

await deleteDoc(doc(db,"testimonials",testimonialIds[i]));

alert("Testimonial deleted ✔");

loadTestimonials();
};

/* DELETE ALL */
window.deleteAllTestimonials = async function(){

const snap=await getDocs(collection(db,"testimonials"));

snap.forEach(async d=>{
await deleteDoc(doc(db,"testimonials",d.id));
});

alert("All testimonials deleted ✔");

loadTestimonials();
};

/* UPLOAD TESTIMONIAL */
window.uploadTestimonial=function(){

cloudinary.openUploadWidget({
cloudName:"db92r6j9z",
uploadPreset:"ummuhalti"
},async(e,r)=>{

if(r?.event==="success"){

await addDoc(collection(db,"testimonials"),{
image:r.info.secure_url,
date:Date.now()
});

alert("Testimonial added ✔");

loadTestimonials();
}

});
};

/* ================= ADMIN ================= */
window.openAdmin=function(){
if(prompt("Password")==="1234"){
admin.style.display="flex";
}
};

window.closeAdmin=function(){
admin.style.display="none";
};

</script>

</body>
</html>
