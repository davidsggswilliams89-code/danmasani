<!DOCTYPE html>
<html>
<head>
<title>HALAL TEXTILE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}
.header{background:black;color:white;padding:10px;text-align:center;position:sticky;top:0;}
.nav{display:flex;background:#222;}
.nav button{flex:1;padding:12px;border:none;color:white;background:#222;}
.nav button:hover{background:orange;}
.section{display:none;padding:10px;}
.active{display:block;}
.product{background:white;margin:10px 0;padding:10px;border-radius:10px;}
.product img{width:100%;border-radius:10px;}
button{padding:8px;border:none;background:black;color:white;border-radius:5px;margin-top:5px;}
button:hover{background:orange;}
input{width:100%;padding:10px;margin:5px 0;}
</style>
</head>

<body>

<div class="header">HALAL TEXTILE</div>

<div class="nav">
  <button onclick="showSection('shop')">Shop</button>
  <button onclick="showSection('admin')">Admin</button>
  <button onclick="showSection('about')">About</button>
  <button onclick="logout()">Logout</button>
</div>

<!-- SHOP -->
<div id="shop" class="section active">

<h3>Categories</h3>
<button onclick="filterCategory('all')">All</button>
<button onclick="filterCategory('shoes')">Shoes</button>
<button onclick="filterCategory('bags')">Bags</button>
<button onclick="filterCategory('clothes')">Clothes</button>

<div id="products"></div>

<h3>Testimonials</h3>
<p>⭐⭐⭐⭐⭐ "Very good quality!"</p>
<p>⭐⭐⭐⭐⭐ "Fast delivery!"</p>

</div>

<!-- LOGIN -->
<div id="login" class="section">
<h3>Admin Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- ADMIN -->
<div id="admin" class="section">

<h3>Add Product</h3>
<input id="name" placeholder="Name">
<input id="price" placeholder="Price">
<input id="category" placeholder="Category (shoes/bags/clothes)">
<input id="image" placeholder="Image URL">

<button onclick="addProduct()">Add Product</button>

<h3>All Products</h3>
<div id="adminProducts"></div>

</div>

<!-- ABOUT -->
<div id="about" class="section">
<h3>About Us</h3>
<p>HALAL TEXTILE provides quality fashion products across Nigeria.</p>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA6ZaMnWKJEvSUlJgh31tU6rj8CvuietuM",
  authDomain: "bob-26647.firebaseapp.com",
  projectId: "bob-26647",
  storageBucket: "bob-26647.firebasestorage.app",
  messagingSenderId: "468659293220",
  appId: "1:468659293220:web:507832347dc70ab78ddcb1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let allProducts = [];
let isAdmin = false;

/* NAVIGATION */
function showSection(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));

if(id==="admin" && !isAdmin){
document.getElementById("login").classList.add("active");
}else{
document.getElementById(id).classList.add("active");
}
}

/* LOGIN */
function login(){
const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value.trim();

if(!email || !password){
alert("Enter login details");
return;
}

auth.signInWithEmailAndPassword(email,password)
.then(()=>alert("Login successful"))
.catch(e=>alert(e.message));
}

/* LOGOUT */
function logout(){
auth.signOut();
}

/* AUTH STATE */
auth.onAuthStateChanged(user=>{
if(user){
isAdmin = true;
showSection("admin");
}else{
isAdmin = false;
showSection("shop");
}
});

/* ADD PRODUCT */
function addProduct(){
const name = document.getElementById("name").value.trim();
const price = document.getElementById("price").value.trim();
const category = document.getElementById("category").value.trim().toLowerCase();
const image = document.getElementById("image").value.trim();

if(!name || !price || !category || !image){
alert("Fill all fields");
return;
}

db.collection("products").add({
name,price,category,
images:[image],
date:Date.now()
}).then(()=>{
alert("Product Added");
clearInputs();
loadProducts();
});
}

function clearInputs(){
name.value="";
price.value="";
category.value="";
image.value="";
}

/* LOAD PRODUCTS */
function loadProducts(){
db.collection("products").orderBy("date","desc").get().then(snapshot=>{
allProducts = [];
snapshot.forEach(doc=>{
let p = doc.data();
p.id = doc.id;
allProducts.push(p);
});
renderProducts(allProducts);
renderAdmin();
});
}

/* RENDER SHOP */
function renderProducts(list){
const container = document.getElementById("products");
container.innerHTML = "";

list.forEach(p=>{
container.innerHTML += `
<div class="product">
<img src="${p.images[0]}">
<h4>${p.name}</h4>
<p>₦${p.price}</p>
<a href="https://wa.me/2349114738932?text=${encodeURIComponent("I want "+p.name)}">
<button>Buy on WhatsApp</button>
</a>
</div>
`;
});
}

/* RENDER ADMIN */
function renderAdmin(){
const container = document.getElementById("adminProducts");
container.innerHTML = "";

allProducts.forEach(p=>{
container.innerHTML += `
<div>
${p.name} - ₦${p.price}
<button onclick="deleteProduct('${p.id}')">Delete</button>
</div>
`;
});
}

/* DELETE */
function deleteProduct(id){
db.collection("products").doc(id).delete().then(()=>{
loadProducts();
});
}

/* FILTER */
function filterCategory(cat){
if(cat === "all"){
renderProducts(allProducts);
}else{
const filtered = allProducts.filter(p=>p.category === cat);
renderProducts(filtered);
}
}

/* INIT */
loadProducts();
</script>

</body>
</html>
