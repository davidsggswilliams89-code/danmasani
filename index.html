<!DOCTYPE html>
<html>
<head>
<title>LUXURY HEAVEN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
padding-top:85px;
}

/* HEADER */
.top{
position:fixed;
top:0;
width:100%;
height:45px;
background:#111;
color:white;
display:flex;
align-items:center;
z-index:9999;
}

.logo{height:45px}

.marquee{
margin-left:90px;
white-space:nowrap;
animation:move 12s linear infinite;
}

@keyframes move{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

/* CATEGORY */
.bar{
position:fixed;
top:45px;
width:100%;
background:#222;
display:flex;
overflow-x:auto;
}

.cat{
color:white;
padding:8px 12px;
margin:5px;
border-radius:20px;
cursor:pointer;
}

.cat.active{background:#25D366}

/* VIEW */
.view{display:none}
.active-view{display:block}

/* CARD */
.card{
background:white;
margin:10px;
padding:10px;
border-radius:12px;
}

.carousel{
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;
}

.carousel img{
min-width:100%;
height:320px;
object-fit:cover;
scroll-snap-align:center;
}

.carousel::-webkit-scrollbar{display:none}

/* PRICE */
.price{
background:#111;
color:white;
text-align:center;
padding:10px;
margin-top:10px;
border-radius:8px;
}

.buy{
width:100%;
padding:10px;
background:#25D366;
color:white;
border:none;
margin-top:10px;
border-radius:10px;
}

/* ADMIN */
.admin{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
z-index:99999;
padding:20px 12px;
overflow:auto;
display:flex;
justify-content:center;
align-items:center;
}

/* FORM BOX */
.form-box{
width:100%;
max-width:340px;
display:flex;
flex-direction:column;
gap:10px;
}

/* INPUTS + BUTTONS SAME WIDTH */
.form-box input,
.form-box select,
.form-box button{
width:100%;
padding:10px 14px;
border-radius:10px;
box-sizing:border-box;
font-size:14px;
}

.form-box input,
.form-box select{
border:1px solid #ccc;
}

.form-box button{
border:none;
}

.green{background:green;color:white}
.red{background:red;color:white}

.green{
margin-bottom:10px;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="top">
<img src="logo1.png" class="logo">
<div class="marquee">✨ LUXURY HEAVEN ✨</div>
<div style="margin-left:auto;padding:10px" onclick="openAdmin()">🔒</div>
</div>

<!-- CATEGORY -->
<div class="bar" id="bar"></div>

<!-- PRODUCT VIEW -->
<div id="view"></div>

<!-- ADMIN -->
<div class="admin" id="admin">

<div class="form-box">

<h2 style="text-align:center;">Admin Panel</h2>

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<select id="cat"></select>

<button class="green" onclick="upload()">📷 Upload Images</button>
<button class="green" onclick="save()">💾 Save Product</button>

<hr>

<h3 style="text-align:center;">Categories</h3>

<input id="newCat" placeholder="New Category">
<button class="green" onclick="addCategory()">Add Category</button>

<select id="deleteCat"></select>
<button class="red" onclick="deleteCategory()">Delete Category</button>

<hr>

<button class="red" onclick="closeAdmin()">Close</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyD40daowTCCVrKr1kWI6krf9nB7OHp8mWU",
authDomain: "luxury-heaven-c24df.firebaseapp.com",
projectId: "luxury-heaven-c24df",
storageBucket: "luxury-heaven-c24df.firebasestorage.app",
messagingSenderId: "277279766368",
appId: "1:277279766368:web:2f5858b54f58d1df629005"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let products=[];
let categories=[];
let images=[];

/* INIT */
window.onload=async()=>{
await loadCategories();
await loadProducts();
};

/* CATEGORY */
async function loadCategories(){

const snap = await getDocs(collection(db,"categories"));

categories=[];

snap.forEach(d=>{
categories.push(d.data().name);
});

let bar=document.getElementById("bar");
let sel=document.getElementById("cat");
let del=document.getElementById("deleteCat");

bar.innerHTML="";
sel.innerHTML="";
del.innerHTML="";

categories.forEach(c=>{
bar.innerHTML+=`<div class="cat">${c}</div>`;
sel.innerHTML+=`<option value="${c}">${c}</option>`;
del.innerHTML+=`<option value="${c}">${c}</option>`;
});
}

/* ADMIN */
window.openAdmin=function(){
if(prompt("Password")==="1234"){
admin.style.display="flex";
}
};

window.closeAdmin=function(){
admin.style.display="none";
};

/* UPLOAD */
window.upload=function(){
cloudinary.openUploadWidget({
cloudName:"db92r6j9z",
uploadPreset:"ummuhalti"
},(e,r)=>{
if(r?.event==="success"){
images.push(r.info.secure_url);
alert("Image uploaded ✔");
}
});
};

/* SAVE PRODUCT */
window.save=async function(){

if(images.length===0){
alert("Upload images first");
return;
}

await addDoc(collection(db,"products"),{
name:document.getElementById("name").value,
price:document.getElementById("price").value,
category:document.getElementById("cat").value,
images:images,
date:Date.now()
});

alert("Product saved ✔");

images=[];
};

/* ================= CATEGORY FIXED WITH FEEDBACK ================= */

window.addCategory = async function () {
let name = document.getElementById("newCat").value.trim();

if (!name) {
alert("Enter category name");
return;
}

await addDoc(collection(db,"categories"),{name});

document.getElementById("newCat").value="";

alert("Category created ✔");

loadCategories();
};

window.deleteCategory = async function () {
let cat = document.getElementById("deleteCat").value;

if (!cat) {
alert("Select category");
return;
}

const snap = await getDocs(collection(db,"categories"));

let deleted = false;

snap.forEach(async d=>{
if(d.data().name === cat){
await deleteDoc(doc(db,"categories",d.id));
deleted = true;
}
});

setTimeout(()=>{
if(deleted){
alert("Category deleted ✔");
}
loadCategories();
},500);
};

</script>

</body>
</html>
