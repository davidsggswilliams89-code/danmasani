
<!DOCTYPE html>
<html>
<head>
<title>LUXURY HEAVEN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;padding-top:80px;}

.top-bar{
position:fixed;top:0;width:100%;height:45px;
background:#111;color:white;display:flex;
align-items:center;padding:0 10px;z-index:3000;
}

.admin-icon{margin-left:auto;cursor:pointer;}

.category-bar{
position:fixed;top:45px;width:100%;height:40px;
background:#222;display:flex;overflow-x:auto;
}

.category-btn{
color:white;padding:6px 14px;margin:5px;
border-radius:20px;cursor:pointer;
white-space:nowrap;
}
.category-btn.active{background:#25D366;}

.view{display:none;padding:10px;}
.active-view{display:block;}

.card{
background:white;border-radius:12px;
padding:10px;margin:10px 0;
}

.admin{
display:none;position:fixed;top:0;left:0;
width:100%;height:100%;background:white;
z-index:9999;padding:10px;overflow:auto;
}

input,select{width:100%;padding:10px;margin:5px 0;}

.btn{width:100%;padding:10px;background:green;color:white;border:none;margin-top:5px;}
.del-btn{background:red;color:white;border:none;padding:6px;margin-top:5px;}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
LUXURY HEAVEN
<div class="admin-icon" onclick="openAdmin()">🔒</div>
</div>

<!-- CATEGORY BAR -->
<div class="category-bar" id="categoryBar"></div>

<!-- ABOUT VIEW -->
<div id="aboutView" class="view active-view">
<div class="card">
<h2 style="text-align:center;">✨ About Luxury Heaven</h2>

<p style="text-align:center;line-height:1.6;">
Luxury Heaven is a premium fashion store in Nigeria offering stylish shoes, bags and accessories.
<br><br>
We deliver nationwide with trusted service.
</p>
</div>
</div>

<!-- PRODUCT VIEW -->
<div id="productView" class="view"></div>

<!-- ADMIN -->
<div class="admin" id="admin">

<h3>Admin Panel</h3>

<h4>Add Category</h4>
<input id="newCat" placeholder="New category name">
<button class="btn" onclick="addCategory()">Add Category</button>

<hr>

<button class="del-btn" onclick="closeAdmin()">Close</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA6ZaMnWKJEvSUlJgh31tU6rj8CvuietuM",
authDomain: "bob-26647.firebaseapp.com",
projectId: "bob-26647",
storageBucket: "bob-26647.firebasestorage.app",
messagingSenderId: "468659293220",
appId: "1:468659293220:web:507832347dc70ab78ddcb1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let categories = [];
let active = "ABOUT";

window.openAdmin = () => admin.style.display="block";
window.closeAdmin = () => admin.style.display="none";

/* INIT */
window.onload = async () => {
await loadCategories();
setupDefaultView();
};

/* LOAD CATEGORIES */
async function loadCategories(){

categories = [];

let snap = await getDocs(collection(db,"categories"));
snap.forEach(d => categories.push(d.data().name));

renderCategoryBar();
}

/* CATEGORY BAR */
function renderCategoryBar(){

let bar = document.getElementById("categoryBar");
bar.innerHTML = "";

/* ABOUT BUTTON */
let about = document.createElement("div");
about.className = "category-btn active";
about.innerText = "ABOUT";
about.onclick = () => showView("ABOUT", about);
bar.appendChild(about);

/* REAL CATEGORIES */
categories.forEach(c=>{
let btn = document.createElement("div");
btn.className = "category-btn";
btn.innerText = c;
btn.onclick = () => showView(c, btn);
bar.appendChild(btn);
});
}

/* VIEW SWITCH */
function showView(type, btn){

document.querySelectorAll(".category-btn")
.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

active = type;

document.getElementById("aboutView").classList.remove("active-view");
document.getElementById("productView").classList.remove("active-view");

if(type === "ABOUT"){
document.getElementById("aboutView").classList.add("active-view");
}else{
document.getElementById("productView").classList.add("active-view");
renderProducts();
}
}

/* DEFAULT */
function setupDefaultView(){
document.getElementById("aboutView").classList.add("active-view");
}

/* ⭐ ADD CATEGORY (FIXED) */
window.addCategory = async () => {

let name = document.getElementById("newCat").value;

if(!name){
alert("Enter category name");
return;
}

await addDoc(collection(db,"categories"),{
name:name.trim(),
createdAt:Date.now()
});

alert("Category added!");

document.getElementById("newCat").value="";

await loadCategories();
};

/* PRODUCTS (EMPTY SAFE) */
function renderProducts(){
let box = document.getElementById("productView");
box.innerHTML = "<p style='text-align:center'>No products loaded yet</p>";
}

</script>

</body>
</html>
