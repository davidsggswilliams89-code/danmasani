<!DOCTYPE html>
<html>
<head>
<title>LUXURY HEAVEN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;padding-top:80px;}

.top-bar{
position:fixed;top:0;width:100%;height:45px;
background:#111;color:white;display:flex;
align-items:center;padding:0 10px;z-index:3000;
}

.admin-icon{margin-left:auto;cursor:pointer;}

.category-bar{
position:fixed;top:45px;width:100%;height:40px;
background:#222;display:flex;overflow-x:auto;
}

.category-btn{
color:white;padding:6px 14px;margin:5px;
border-radius:20px;cursor:pointer;
white-space:nowrap;
}
.category-btn.active{background:#25D366;}

.view{display:none;padding:10px;}
.active-view{display:block;}

.card{
background:white;border-radius:12px;
padding:10px;margin:10px 0;
}

.carousel{
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;
}
.carousel img{
min-width:100%;
height:300px;
object-fit:cover;
scroll-snap-align:center;
border-radius:10px;
}
.carousel::-webkit-scrollbar{display:none}

.new-badge{
position:absolute;
top:10px;
left:10px;
background:red;
color:white;
padding:5px 8px;
font-size:12px;
border-radius:6px;
font-weight:bold;
}

.dots{text-align:center;margin-top:5px;}
.dot{
height:8px;width:8px;background:#bbb;
border-radius:50%;display:inline-block;margin:0 3px;
}
.dot.active{background:#25D366;}

.price{
background:#111;color:white;padding:10px;
text-align:center;border-radius:8px;margin-top:8px;
}

.buy-btn{
background:#25D366;color:white;
padding:12px;border:none;width:100%;
border-radius:12px;margin-top:10px;
display:flex;align-items:center;
justify-content:center;gap:8px;font-weight:bold;
cursor:pointer;
}

.admin{
display:none;position:fixed;top:0;left:0;
width:100%;height:100%;background:white;
z-index:9999;padding:10px;overflow:auto;
}

input,select{width:100%;padding:10px;margin:5px 0;}

.btn{width:100%;padding:10px;background:green;color:white;border:none;margin-top:5px;}
.del-btn{background:red;color:white;border:none;padding:6px;margin-top:5px;}
</style>
</head>

<body>

<div class="top-bar">
LUXURY HEAVEN
<div class="admin-icon" onclick="openAdmin()">🔒</div>
</div>

<div class="category-bar" id="categoryBar"></div>

<!-- ABOUT -->
<div id="aboutView" class="view active-view">
<div class="card">
<h2 style="text-align:center;">✨ About Luxury Heaven</h2>
<p style="text-align:center;">
Premium fashion store in Nigeria
</p>
</div>
</div>

<!-- PRODUCTS -->
<div id="productView" class="view"></div>

<!-- ADMIN -->
<div class="admin" id="admin">

<h3>Admin Panel</h3>

<input id="pname" placeholder="Product name">
<input id="price" placeholder="Price">
<select id="category"></select>

<button class="btn" onclick="uploadImages()">Upload Images</button>
<button class="btn" onclick="saveProduct()">Save Product</button>

<hr>

<h3>Add Category</h3>
<input id="newCat" placeholder="New category name">
<button class="btn" onclick="addCategory()">Add Category</button>

<hr>

<button class="del-btn" onclick="closeAdmin()">Close</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA6ZaMnWKJEvSUlJgh31tU6rj8CvuietuM",
authDomain: "bob-26647.firebaseapp.com",
projectId: "bob-26647",
storageBucket: "bob-26647.firebasestorage.app",
messagingSenderId: "468659293220",
appId: "1:468659293220:web:507832347dc70ab78ddcb1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let categories = [];

window.openAdmin = () => admin.style.display="block";
window.closeAdmin = () => admin.style.display="none";

/* LOAD CATEGORIES */
async function loadCategories(){
categories = [];

let snap = await getDocs(collection(db,"categories"));

snap.forEach(d => categories.push(d.data().name));

let sel = document.getElementById("category");
sel.innerHTML = "";

categories.forEach(c=>{
sel.innerHTML += `<option value="${c}">${c}</option>`;
});
}

/* ⭐ FIXED ADD CATEGORY FUNCTION */
window.addCategory = async () => {
let name = document.getElementById("newCat").value;

if(!name){
alert("Enter category name");
return;
}

try{
await addDoc(collection(db,"categories"),{
name:name.trim(),
createdAt:Date.now()
});

alert("Category added successfully");

document.getElementById("newCat").value="";

await loadCategories();

}catch(err){
console.log(err);
alert("Error adding category");
}
};

/* INIT */
window.onload = async () => {
await loadCategories();
};

</script>

</body>
</html>
