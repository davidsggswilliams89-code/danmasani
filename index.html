<!DOCTYPE html>

<head>
  <title>LUXURY HEAVEN</title>

body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
  padding-top:80px;
}

/* HEADER */
.top{
  position:fixed;
  top:0;
  width:100%;
  height:45px;
  background:#111;
  display:flex;
  align-items:center;
  color:white;
  z-index:3000;
}

.logo{height:45px;}

.marquee{
  white-space:nowrap;
  animation:move 12s linear infinite;
  margin-left:100px;
}

@keyframes move{
  0%{transform:translateX(100%);}
  100%{transform:translateX(-100%);}
}

/* CATEGORY */
.bar{
  position:fixed;
  top:45px;
  width:100%;
  background:#222;
  display:flex;
  overflow-x:auto;
}

.btn-cat{
  color:white;
  padding:6px 12px;
  margin:5px;
  border-radius:20px;
  cursor:pointer;
}

.btn-cat.active{background:#25D366;}

/* PRODUCT */
.card{
  background:white;
  margin:10px;
  padding:10px;
  border-radius:12px;
}

.carousel img{
  width:100%;
  height:320px;
  object-fit:cover;
  border-radius:10px;
}

.price{
  background:#111;
  color:white;
  text-align:center;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}

.buy{
  background:#25D366;
  color:white;
  border:none;
  width:100%;
  padding:10px;
  border-radius:10px;
}

/* ADMIN */
.admin{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;
  z-index:5000;
  padding:10px;
  overflow:auto;
}

input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
}
