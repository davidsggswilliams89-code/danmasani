<!DOCTYPE html>
<html>
<head>
<title>LUXURY HEAVEN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
padding-top:80px;
}

/* TOP BAR */
.top-bar{
position:fixed;
top:0;
width:100%;
height:45px;
background:#111;
color:white;
display:flex;
align-items:center;
padding:0 10px;
z-index:3000;
}

.admin-icon{margin-left:auto;cursor:pointer;}

/* CATEGORY BAR */
.category-bar{
position:fixed;
top:45px;
width:100%;
height:40px;
background:#222;
display:flex;
overflow-x:auto;
}

.category-btn{
color:white;
padding:6px 14px;
margin:5px;
border-radius:20px;
cursor:pointer;
white-space:nowrap;
}
.category-btn.active{background:#25D366;}

/* VIEWS */
.view{
display:none;
padding:10px;
}
.active-view{
display:block;
}

/* CARDS */
.card{
background:white;
border-radius:12px;
padding:10px;
margin:10px 0;
}

/* IMAGE FIX */
.carousel{
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;
border-radius:10px;
height:380px;
background:#000;
}

.carousel img{
min-width:100%;
height:100%;
object-fit:cover;
scroll-snap-align:center;
border-radius:10px;
}

.carousel::-webkit-scrollbar{display:none;}

/* PRICE */
.price{
background:#111;
color:white;
padding:10px;
text-align:center;
border-radius:8px;
margin-top:8px;
}

/* BUY BUTTON */
.buy-btn{
background:#25D366;
color:white;
padding:12px;
border:none;
width:100%;
border-radius:12px;
margin-top:10px;
font-weight:bold;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
}

/* ADMIN */
.admin{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
z-index:9999;
padding:10px;
overflow:auto;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
}

.btn{
width:100%;
padding:10px;
background:green;
color:white;
border:none;
margin-top:5px;
}

.del-btn{
background:red;
color:white;
border:none;
padding:6px;
margin-top:5px;
}

/* PREVIEW */
.preview img{
width:80px;
height:80px;
object-fit:cover;
margin:5px;
border-radius:10px;
}

/* DELETE CARD */
.delete-card{
display:flex;
align-items:center;
gap:10px;
background:#fff;
padding:8px;
border-radius:10px;
margin:5px 0;
}

.delete-card img{
width:60px;
height:60px;
object-fit:cover;
border-radius:8px;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
LUXURY HEAVEN
<div class="admin-icon" onclick="openAdmin()">🔒</div>
</div>

<!-- CATEGORY -->
<div class="category-bar" id="categoryBar"></div>

<!-- ABOUT -->
<div id="aboutView" class="view active-view">
<div class="card">
<h2 style="text-align:center;">✨ About Luxury Heaven</h2>
<p style="text-align:center;">
Premium fashion store in Nigeria. Shoes, bags, hijabs & accessories.
</p>
</div>
</div>

<!-- PRODUCTS -->
<div id="productView" class="view"></div>

<!-- ADMIN -->
<div class="admin" id="admin">

<h3>ADMIN PANEL</h3>

<!-- CATEGORY -->
<h4>Add Category</h4>
<input id="newCat" placeholder="Category name">
<button class="btn" onclick="addCategory()">Add Category</button>

<h4>Delete Category</h4>
<select id="delCat"></select>
<button class="del-btn" onclick="deleteCategory()">Delete Category</button>

<hr>

<!-- PRODUCT -->
<h4>Add Product</h4>
<input id="pname" placeholder="Product name">
<input id="price" placeholder="Price">
<select id="pcat"></select>

<button class="btn" onclick="uploadImages()">Upload Images</button>
<div class="preview" id="preview"></div>
<button class="btn" onclick="saveProduct()">Save Product</button>

<hr>

<!-- DELETE PRODUCTS -->
<h4>Delete Products</h4>
<select id="deleteCatSelect" onchange="loadDeleteProducts()"></select>
<div id="deleteProductBox"></div>

<hr>

<button class="del-btn" onclick="closeAdmin()">Close</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA6ZaMnWKJEvSUlJgh31tU6rj8CvuietuM",
authDomain: "bob-26647.firebaseapp.com",
projectId: "bob-26647",
storageBucket: "bob-26647.firebasestorage.app",
messagingSenderId: "468659293220",
appId: "1:468659293220:web:507832347dc70ab78ddcb1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let categories=[],products=[];
let uploadedImages=[];
let active="ABOUT";

/* 🔐 PASSWORD */
const ADMIN_PASSWORD="12345";

window.openAdmin=()=>{
let pass = prompt("Enter Admin Password");
if(pass===ADMIN_PASSWORD){
admin.style.display="block";
}else{
alert("Wrong Password");
}
};

window.closeAdmin=()=>admin.style.display="none";

/* LOAD */
window.onload=async()=>{
await loadAll();
renderCategories();
};

/* LOAD DATA */
async function loadAll(){

categories=[];
products=[];

let c=await getDocs(collection(db,"categories"));
c.forEach(d=>categories.push({id:d.id,...d.data()}));

let p=await getDocs(collection(db,"products"));
p.forEach(d=>products.push({id:d.id,...d.data(),images:Array.isArray(d.data().images)?d.data().images:[]}));

fillAdmin();
}

/* CATEGORY BAR */
function renderCategories(){
let bar=document.getElementById("categoryBar");
bar.innerHTML="";

let about=document.createElement("div");
about.className="category-btn active";
about.innerText="ABOUT";
about.onclick=()=>show("ABOUT",about);
bar.appendChild(about);

categories.forEach(c=>{
let btn=document.createElement("div");
btn.className="category-btn";
btn.innerText=c.name;
btn.onclick=()=>show(c.name,btn);
bar.appendChild(btn);
});
}

/* VIEW SWITCH FIX */
function show(type,btn){

document.querySelectorAll(".category-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

active=type;

if(type==="ABOUT"){
aboutView.style.display="block";
productView.style.display="none";
return;
}

aboutView.style.display="none";
productView.style.display="block";

renderProducts();
}

/* PRODUCTS */
function renderProducts(){

let box=document.getElementById("productView");
box.innerHTML="";

let list=products.filter(p=>p.category===active);

list.forEach((p,i)=>{

box.innerHTML+=`
<div class="card">

<div class="carousel">
${(p.images||[]).map(img=>`<img src="${img}">`).join("")}
</div>

<h3 style="text-align:center">${p.name}</h3>

<div class="price">₦${p.price}</div>

<button class="buy-btn">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="18">
BUY NOW
</button>

</div>`;
});
}

/* DELETE PRODUCTS */
window.loadDeleteProducts=()=>{
let cat=deleteCatSelect.value;
let box=document.getElementById("deleteProductBox");
box.innerHTML="";

products.filter(p=>p.category===cat).forEach(p=>{
box.innerHTML+=`
<div class="delete-card">
<img src="${p.images?.[0]||''}">
<div>
<b>${p.name}</b><br>
<button class="del-btn" onclick="deleteProduct('${p.id}')">Delete</button>
</div>
</div>`;
});
};

window.deleteProduct=async(id)=>{
await deleteDoc(doc(db,"products",id));
await loadAll();
loadDeleteProducts();
};

/* CATEGORY */
window.addCategory=async()=>{
await addDoc(collection(db,"categories"),{name:newCat.value});
newCat.value="";
await loadAll();
renderCategories();
};

window.deleteCategory=async()=>{
await deleteDoc(doc(db,"categories",delCat.value));
await loadAll();
renderCategories();
};

/* SAVE PRODUCT */
window.saveProduct=async()=>{
await addDoc(collection(db,"products"),{
name:pname.value,
price:price.value,
category:pcat.value,
images:uploadedImages,
date:Date.now()
});
await loadAll();
};

/* CLOUDINARY */
window.uploadImages=()=>{
uploadedImages=[];
cloudinary.openUploadWidget({
cloudName:"db92r6j9z",
uploadPreset:"ummuhalti",
multiple:true
},(e,r)=>{
if(!e&&r.event==="success"){
uploadedImages.push(r.info.secure_url);
preview.innerHTML=uploadedImages.map(i=>`<img src="${i}">`).join("");
}
});
};

</script>

</body>
</html>
