<!DOCTYPE html>
<html>
<head>
<title>LUXURY HEAVEN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
padding-top:80px;
}

/* HEADER */
.top{
position:fixed;
top:0;
width:100%;
height:45px;
background:#111;
color:white;
display:flex;
align-items:center;
z-index:9999;
}

.logo{height:45px}

.marquee{
margin-left:90px;
white-space:nowrap;
animation:move 12s linear infinite;
}

@keyframes move{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

/* CARD */
.card{
background:white;
margin:10px;
padding:10px;
border-radius:12px;
}

/* CAROUSEL */
.carousel{
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;
scroll-behavior:smooth;
border-radius:12px;
}

.carousel img{
min-width:100%;
height:350px;
object-fit:cover;
scroll-snap-align:center;
border-radius:12px;
}

.carousel::-webkit-scrollbar{display:none}

/* DOTS */
.dots{
text-align:center;
margin-top:5px;
}

.dot{
height:8px;
width:8px;
margin:0 3px;
background:#bbb;
border-radius:50%;
display:inline-block;
}

.dot.active{background:#25D366}

/* PRICE */
.price{
background:#111;
color:white;
text-align:center;
padding:10px;
margin-top:10px;
border-radius:8px;
}

/* BUTTON */
.buy-btn{
background:#25D366;
color:white;
border:none;
width:100%;
padding:10px;
margin-top:10px;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="top">
<img src="logo1.png" class="logo">
<div class="marquee">✨ LUXURY HEAVEN ✨</div>
</div>

<div id="view"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyD40daowTCCVrKr1kWI6krf9nB7OHp8mWU",
authDomain: "luxury-heaven-c24df.firebaseapp.com",
projectId: "luxury-heaven-c24df",
storageBucket: "luxury-heaven-c24df.firebasestorage.app",
messagingSenderId: "277279766368",
appId: "1:277279766368:web:2f5858b54f58d1df629005"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let products = [];

/* TRACK IMAGE INDEX */
let currentImageIndex = {};

/* LOAD */
window.onload = async () => {
await loadProducts();
};

/* GET IMAGES */
function getImages(p){
if(Array.isArray(p.images) && p.images.length>0){
return p.images;
}
if(p.image){
return [p.image];
}
return [];
}

/* LOAD PRODUCTS */
async function loadProducts(){
const snap = await getDocs(collection(db,"products"));

products = [];

snap.forEach(d=>{
products.push(d.data());
});

renderProducts();
}

/* RENDER */
function renderProducts(){

let view = document.getElementById("view");
view.innerHTML = "";

products.forEach((p,i)=>{

let type = (p.category || "item").toLowerCase();
let images = getImages(p);

let key = type+i;

currentImageIndex[key] = 0;

view.innerHTML += `
<div class="card">

<div class="carousel car${key}">
${images.map(img=>`<img src="${img}">`).join("")}
</div>

<div class="dots dots${key}"></div>

<div class="price">₦ ${p.price}</div>

<button class="buy-btn" onclick="buyNow(${i},'${type}')">
BUY NOW
</button>

</div>
`;

setTimeout(()=>setupCarousel(key),100);

});

}

/* CAROUSEL */
function setupCarousel(key){

let c = document.querySelector(".car"+key);
let box = document.querySelector(".dots"+key);

if(!c || !box) return;

let imgs = c.querySelectorAll("img");
box.innerHTML = "";

imgs.forEach((_,x)=>{
let d = document.createElement("span");
d.className = "dot" + (x===0?" active":"");
box.appendChild(d);
});

let dots = box.querySelectorAll(".dot");

c.addEventListener("scroll",()=>{

let index = Math.round(c.scrollLeft / c.clientWidth);

currentImageIndex[key] = index;

dots.forEach(d=>d.classList.remove("active"));

if(dots[index]) dots[index].classList.add("active");

});

}

/* BUY NOW - SELECTED IMAGE FIX */
window.buyNow = function(i,type){

let p = products[i];

let key = type.toLowerCase() + i;

let images = getImages(p);

let index = currentImageIndex[key] || 0;

let img = images[index] || images[0] || "";

let msg = `Hello 👋,

I want to order this Product:

🧵 Category: ${p.category}
🛍️ Product: ${p.name}
💰 Price: ₦${p.price}

🖼️ Selected Image:
${img}

Is this available? I want to buy.`;

window.open("https://wa.me/2349114738932?text="+encodeURIComponent(msg));

};

</script>

</body>
</html>
