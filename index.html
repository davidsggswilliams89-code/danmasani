<!DOCTYPE html>
<html>
<head>
  <title>Luxury Heaven Ecommerce</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background: #111;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .container {
      padding: 15px;
      max-width: 900px;
      margin: auto;
    }

    .form {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>Luxury Heaven Ecommerce</header>

<div class="container">

  <div class="form">
    <h3>Add Product</h3>
    <input id="name" placeholder="Product Name">
    <input id="price" placeholder="Price">
    <input type="file" id="image">

    <button onclick="uploadProduct()">Upload Product</button>
  </div>

  <div class="grid" id="products"></div>

</div>

<script>
  // ---------------- FIREBASE CONFIG (YOUR DATA ADDED) ----------------
  const firebaseConfig = {
    apiKey: "AIzaSyD40daowTCCVrKr1kWI6krf9nB7OHp8mWU",
    authDomain: "luxury-heaven-c24df.firebaseapp.com",
    projectId: "luxury-heaven-c24df",
    storageBucket: "luxury-heaven-c24df.firebasestorage.app",
    messagingSenderId: "277279766368",
    appId: "1:277279766368:web:2f5858b54f58d1df629005"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // ---------------- CLOUDINARY CONFIG ----------------
  const cloudName = "db92r6j9z";
  const uploadPreset = "ummuhalti";

  // Upload image to Cloudinary
  async function uploadToCloudinary(file) {
    let formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", uploadPreset);

    let res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
      method: "POST",
      body: formData
    });

    let data = await res.json();
    return data.secure_url;
  }

  // Upload product
  async function uploadProduct() {
    let name = document.getElementById("name").value;
    let price = document.getElementById("price").value;
    let file = document.getElementById("image").files[0];

    if (!name || !price || !file) {
      alert("Fill all fields");
      return;
    }

    let imageUrl = await uploadToCloudinary(file);

    await db.collection("products").add({
      name,
      price,
      image: imageUrl,
      time: Date.now()
    });

    alert("Product uploaded successfully!");
    loadProducts();
  }

  // Load products
  function loadProducts() {
    db.collection("products").orderBy("time", "desc").onSnapshot(snapshot => {
      let html = "";

      snapshot.forEach(doc => {
        let p = doc.data();

        html += `
          <div class="card">
            <img src="${p.image}">
            <h4>${p.name}</h4>
            <p>₦${p.price}</p>
          </div>
        `;
      });

      document.getElementById("products").innerHTML = html;
    });
  }

  loadProducts();
</script>

</body>
</html>
