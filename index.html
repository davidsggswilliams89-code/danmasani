<!DOCTYPE html>
<html>
<head>
<title>LUXURY HEAVEN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
padding-top:80px;
}

.top{
position:fixed;
top:0;
width:100%;
height:45px;
background:#111;
color:white;
display:flex;
align-items:center;
z-index:9999;
}

.logo{height:45px}

.marquee{
margin-left:90px;
white-space:nowrap;
animation:move 12s linear infinite;
}

@keyframes move{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

.bar{
position:fixed;
top:45px;
width:100%;
background:#222;
display:flex;
overflow-x:auto;
}

.cat{
color:white;
padding:8px 14px;
margin:5px;
border-radius:20px;
cursor:pointer;
white-space:nowrap;
}

.cat.active{background:#25D366}

.admin{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
z-index:99999;
padding:20px;
overflow:auto;
}

input,select,button{
width:100%;
padding:10px;
margin:5px 0;
}

.green{background:green;color:white}
.red{background:red;color:white}

</style>
</head>

<body>

<!-- HEADER -->
<div class="top">
<img src="logo1.png" class="logo">
<div class="marquee">✨ LUXURY HEAVEN ✨</div>
<div style="margin-left:auto;padding:10px;cursor:pointer" onclick="openAdmin()">🔒</div>
</div>

<!-- CATEGORY -->
<div class="bar" id="bar"></div>

<div id="view"></div>

<!-- ADMIN -->
<div class="admin" id="admin">

<h2>Admin Panel</h2>

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<select id="cat"></select>

<button class="green" onclick="upload()">Upload Images</button>
<button class="green" onclick="saveProduct()">Save Product</button>

<hr>

<input id="newCat" placeholder="New Category">
<button class="green" onclick="addCategory()">Add Category</button>

<select id="delCat"></select>
<button class="red" onclick="deleteCategory()">Delete Category</button>

<hr>

<button class="red" onclick="closeAdmin()">Close</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyD40daowTCCVrKr1kWI6krf9nB7OHp8mWU",
authDomain: "luxury-heaven-c24df.firebaseapp.com",
projectId: "luxury-heaven-c24df",
storageBucket: "luxury-heaven-c24df.firebasestorage.app",
messagingSenderId: "277279766368",
appId: "1:277279766368:web:2f5858b54f58d1df629005"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let products = [];
let categories = [];
let uploadedImages = [];

/* OPEN ADMIN */
window.openAdmin = () => {
document.getElementById("admin").style.display="block";
};

window.closeAdmin = () => {
document.getElementById("admin").style.display="none";
};

/* LOAD PRODUCTS */
async function loadProducts(){
const snap = await getDocs(collection(db,"products"));
products = [];
snap.forEach(d=>products.push(d.data()));
}

/* LOAD CATEGORIES */
async function loadCategories(){
const snap = await getDocs(collection(db,"categories"));
categories = [];

let bar = document.getElementById("bar");
let sel = document.getElementById("cat");
let del = document.getElementById("delCat");

bar.innerHTML="";
sel.innerHTML="";
del.innerHTML="";

snap.forEach(d=>{
let c = d.data().name;
categories.push(c);

/* BUTTON */
let btn = document.createElement("div");
btn.className="cat";
btn.innerText=c;

btn.onclick = () => {
document.querySelectorAll(".cat").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
renderProducts(c);
};

bar.appendChild(btn);

/* SELECT */
sel.innerHTML += `<option>${c}</option>`;
del.innerHTML += `<option>${c}</option>`;

});
}

/* RENDER */
function renderProducts(cat){

let view = document.getElementById("view");
view.innerHTML="";

let filtered = products.filter(p =>
(p.category || "").toLowerCase() === cat.toLowerCase()
);

filtered.forEach(p=>{
view.innerHTML += `
<div class="card">
<h3>${p.name}</h3>
<p>₦ ${p.price}</p>
</div>
`;
});

}

/* FIXED SAVE PRODUCT */
window.saveProduct = async function(){

const product = {
name: document.getElementById("name").value,
price: document.getElementById("price").value,
category: document.getElementById("cat").value,
images: uploadedImages,
date: Date.now()
};

if(!product.name || !product.price || !product.category){
alert("Fill all fields ❌");
return;
}

if(uploadedImages.length === 0){
alert("Upload images first ❌");
return;
}

await addDoc(collection(db,"products"), product);

alert("Product uploaded successfully ✅");

document.getElementById("name").value="";
document.getElementById("price").value="";
uploadedImages=[];

loadProducts();
};

/* UPLOAD */
window.upload = function(){
cloudinary.openUploadWidget({
cloudName:"db92r6j9z",
uploadPreset:"ummuhalti",
multiple:true
},(e,r)=>{
if(r && r.event==="success"){
uploadedImages.push(r.info.secure_url);
alert("Uploaded ✔");
}
});
};

/* CATEGORY */
window.addCategory = async function(){
await addDoc(collection(db,"categories"),{
name:document.getElementById("newCat").value
});
alert("Category added ✔");
loadCategories();
};

window.deleteCategory = async function(){

const snap = await getDocs(collection(db,"categories"));

snap.forEach(async d=>{
if(d.data().name === document.getElementById("delCat").value){
await deleteDoc(doc(db,"categories",d.id));
}
});

alert("Category deleted ✔");
loadCategories();
};

/* INIT */
window.onload = async () => {
await loadCategories();
await loadProducts();
};

</script>

</body>
</html>
