<!DOCTYPE html>
<html>
<head>
<title>LUXURY HEAVEN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
padding-top:85px;
}

/* HEADER */
.top{
position:fixed;
top:0;
width:100%;
height:45px;
background:#111;
color:white;
display:flex;
align-items:center;
z-index:9999;
}

.logo{height:45px}

.marquee{
margin-left:90px;
white-space:nowrap;
animation:move 12s linear infinite;
}

@keyframes move{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

/* CATEGORY BAR */
.bar{
position:fixed;
top:45px;
width:100%;
background:#222;
display:flex;
overflow-x:auto;
z-index:9998;
}

.cat{
color:white;
padding:8px 14px;
margin:5px;
border-radius:20px;
cursor:pointer;
white-space:nowrap;
font-size:13px;
}

.cat.active{
background:#25D366;
}

/* VIEWS */
.view{
display:none;
margin-top:90px;
}

.active-view{
display:block;
}

/* CARD */
.card{
background:white;
margin:10px;
padding:10px;
border-radius:12px;
}

/* ADMIN FIX (IMPORTANT: hidden by default) */
.admin{
display:none;   /* 🔥 FIXED */
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
z-index:99999;

justify-content:center;
align-items:center;
padding:20px;
}

.form-box{
width:100%;
max-width:360px;
display:flex;
flex-direction:column;
gap:10px;
}

.form-box input,
.form-box select,
.form-box button{
width:100%;
padding:10px 12px;
border-radius:10px;
box-sizing:border-box;
font-size:14px;
}

.form-box input,
.form-box select{
border:1px solid #ccc;
}

.green{background:green;color:white}
.red{background:red;color:white}

</style>
</head>

<body>

<!-- HEADER -->
<div class="top">
<img src="logo1.png" class="logo">
<div class="marquee">✨ LUXURY HEAVEN ✨</div>
<div style="margin-left:auto;padding:10px" onclick="openAdmin()">🔒</div>
</div>

<!-- CATEGORY BAR -->
<div class="bar" id="bar"></div>

<!-- ABOUT SECTION -->
<div id="about" class="view active-view">
  <div class="card">
    <h2 style="text-align:center;">Welcome to Luxury Heaven 👋</h2>

    <h3>About Us</h3>
    <p>Luxury Heaven is a fashion store offering quality products at affordable prices.</p>

    <h3>Mission</h3>
    <p>Deliver stylish fashion with fast nationwide delivery.</p>

    <h3>Contact</h3>
    <p>WhatsApp support available 24/7</p>
  </div>
</div>

<!-- PRODUCT VIEW CONTAINER -->
<div id="view"></div>

<!-- ADMIN (FIXED - hidden properly) -->
<div class="admin" id="admin">

<div class="form-box">

<h2 style="text-align:center;">Admin Panel</h2>

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<select id="cat"></select>

<button class="green" onclick="upload()">📷 Upload Images</button>
<button class="green" onclick="save()">💾 Save Product</button>

<hr>

<h3>Categories</h3>

<input id="newCat" placeholder="New Category">
<button class="green" onclick="addCategory()">Add Category</button>

<select id="deleteCat"></select>
<button class="red" onclick="deleteCategory()">Delete Category</button>

<hr>

<button class="red" onclick="closeAdmin()">Close</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyD40daowTCCVrKr1kWI6krf9nB7OHp8mWU",
authDomain: "luxury-heaven-c24df.firebaseapp.com",
projectId: "luxury-heaven-c24df",
storageBucket: "luxury-heaven-c24df.firebasestorage.app",
messagingSenderId: "277279766368",
appId: "1:277279766368:web:2f5858b54f58d1df629005"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let categories=[];
let activeBtn=null;

/* INIT */
window.onload=async()=>{
await loadCategories();
};

/* CATEGORY LOAD */
async function loadCategories(){

const snap = await getDocs(collection(db,"categories"));

categories=[];

snap.forEach(d=>{
categories.push(d.data().name);
});

let bar=document.getElementById("bar");
let sel=document.getElementById("cat");
let del=document.getElementById("deleteCat");

bar.innerHTML="";
sel.innerHTML="";
del.innerHTML="";

/* ABOUT BUTTON */
let aboutBtn=document.createElement("div");
aboutBtn.className="cat active";
aboutBtn.innerText="ABOUT";

aboutBtn.onclick=function(){
showAbout(aboutBtn);
};

bar.appendChild(aboutBtn);

/* CATEGORY BUTTONS */
categories.forEach(c=>{

let btn=document.createElement("div");
btn.className="cat";
btn.innerText=c;

btn.onclick=function(){
showView(c,btn);
};

bar.appendChild(btn);

sel.innerHTML+=`<option value="${c}">${c}</option>`;
del.innerHTML+=`<option value="${c}">${c}</option>`;
});

}

/* VIEW SYSTEM FIX */
function showAbout(btn){

setActive(btn);

hideAll();

document.getElementById("about").classList.add("active-view");
}

function showView(cat,btn){

setActive(btn);

hideAll();

let view=document.getElementById(cat);

if(!view){
view=document.createElement("div");
view.id=cat;
view.className="view";
document.body.appendChild(view);
}

view.innerHTML=`
<div class="card">
<h3>${cat.toUpperCase()}</h3>
<p>Products coming soon...</p>
</div>`;

view.classList.add("active-view");
}

function setActive(btn){
if(activeBtn) activeBtn.classList.remove("active");
btn.classList.add("active");
activeBtn=btn;
}

function hideAll(){
document.querySelectorAll(".view").forEach(v=>{
v.classList.remove("active-view");
});
}

/* ADMIN OPEN */
window.openAdmin=function(){
if(prompt("Password")==="1234"){
admin.style.display="flex";
}
};

window.closeAdmin=function(){
admin.style.display="none";
};

</script>

</body>
</html>
