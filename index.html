<!DOCTYPE html>
<html>
<head>
<title>LUXURY HEAVEN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
padding-top:90px;
}

.header{
position:fixed;
top:0;
width:100%;
height:50px;
background:#111;
color:white;
display:flex;
align-items:center;
padding:0 10px;
z-index:999;
}

.bar{
position:fixed;
top:50px;
width:100%;
background:#222;
display:flex;
overflow-x:auto;
}

.cat{
color:white;
padding:8px 14px;
margin:5px;
border-radius:20px;
cursor:pointer;
white-space:nowrap;
}
.cat.active{background:#25D366}

.view{margin-top:100px}

.card{
background:white;
margin:10px;
padding:10px;
border-radius:12px;
}

/* CAROUSEL */
.carousel{
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;
scroll-behavior:smooth;
}
.carousel img{
min-width:100%;
height:250px;
object-fit:cover;
scroll-snap-align:center;
border-radius:10px;
}
.carousel::-webkit-scrollbar{display:none}

/* DOTS */
.dots{text-align:center;margin-top:5px}
.dot{
height:8px;width:8px;
background:#bbb;
border-radius:50%;
display:inline-block;
margin:0 3px;
}
.dot.active{background:#25D366}

.price{
background:#111;
color:white;
padding:8px;
text-align:center;
border-radius:8px;
margin-top:8px;
}

button{
width:100%;
padding:10px;
margin-top:6px;
border:none;
border-radius:8px;
cursor:pointer;
}

.buy{background:#25D366;color:white}
.del{background:red;color:white}
.save{background:green;color:white}

.admin{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
z-index:9999;
padding:15px;
overflow:auto;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
background:#eee;
padding:8px;
margin:5px 0;
border-radius:8px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<h3>LUXURY HEAVEN</h3>
<div style="margin-left:auto;cursor:pointer" onclick="openAdmin()">⚙️</div>
</div>

<!-- CATEGORY -->
<div class="bar" id="catBar"></div>

<!-- PRODUCTS -->
<div id="view" class="view"></div>

<!-- ADMIN -->
<div class="admin" id="admin">

<h3>ADMIN PANEL</h3>

<input id="pname" placeholder="Product name">
<input id="price" placeholder="Price">
<select id="category"></select>

<button class="save" onclick="upload()">Upload Images</button>
<button class="save" onclick="saveProduct()">Save Product</button>

<hr>

<h4>Delete Products</h4>
<select id="delCat" onchange="loadAdminProducts()"></select>
<div id="adminList"></div>

<hr>

<h4>Add Category</h4>
<input id="newCat">
<button class="save" onclick="addCategory()">Add</button>

<h4>Delete Category</h4>
<select id="delCat2"></select>
<button class="del" onclick="deleteCategory()">Delete</button>

<hr>

<button class="del" onclick="closeAdmin()">Close</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore, collection, getDocs, addDoc, deleteDoc, doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyD40daowTCCVrKr1kWI6krf9nB7OHp8mWU",
authDomain: "luxury-heaven-c24df.firebaseapp.com",
projectId: "luxury-heaven-c24df",
storageBucket: "luxury-heaven-c24df.firebasestorage.app",
messagingSenderId: "277279766368",
appId: "1:277279766368:web:2f5858b54f58d1df629005"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* STATE */
let products = [];
let images = [];
let active = "";
let activeImageIndex = {};

/* ADMIN */
window.openAdmin = ()=>admin.style.display="block";
window.closeAdmin = ()=>admin.style.display="none";

/* INIT */
window.onload = async ()=>{
await loadCategories();
await loadProducts();
};

/* LOAD PRODUCTS */
async function loadProducts(){
const snap = await getDocs(collection(db,"products"));
products = [];
snap.forEach(d=>{
products.push({id:d.id,...d.data()});
});
if(active) render();
}

/* LOAD CATEGORIES */
async function loadCategories(){

const snap = await getDocs(collection(db,"categories"));

catBar.innerHTML="";
category.innerHTML="";
delCat.innerHTML="";
delCat2.innerHTML="";

snap.forEach(d=>{
let c = d.data().name;

let b = document.createElement("div");
b.className="cat";
b.innerText=c;

b.onclick=()=>{
document.querySelectorAll(".cat").forEach(x=>x.classList.remove("active"));
b.classList.add("active");

active=c.toLowerCase().trim();
render();
};

catBar.appendChild(b);

category.innerHTML+=`<option>${c}</option>`;
delCat.innerHTML+=`<option>${c}</option>`;
delCat2.innerHTML+=`<option>${c}</option>`;
});
}

/* RENDER */
function render(){
view.innerHTML="";

let filtered = products.filter(p =>
(p.category||"").toLowerCase().trim() === active
);

if(filtered.length===0){
view.innerHTML="<p style='text-align:center'>No products</p>";
return;
}

filtered.forEach((p,i)=>{

let imgs = p.images || [];
activeImageIndex[p.id]=0;

view.innerHTML+=`
<div class="card">

<div class="carousel" id="car${i}">
${imgs.map(img=>`<img src="${img}">`).join("")}
</div>

<div class="dots" id="dots${i}"></div>

<p class="price">₦ ${p.price}</p>

<button class="buy" onclick="buy('${p.id}','${p.name}','${p.price}')">
BUY
</button>

</div>
`;

setTimeout(()=>setupCarousel(i,p.id,imgs.length),100);
});
}

/* CAROUSEL */
function setupCarousel(i,id,count){

let c = document.getElementById("car"+i);
let dotsBox = document.getElementById("dots"+i);

dotsBox.innerHTML="";

for(let x=0;x<count;x++){
let d=document.createElement("span");
d.className="dot"+(x===0?" active":"");
dotsBox.appendChild(d);
}

let dots = dotsBox.querySelectorAll(".dot");

c.addEventListener("scroll",()=>{
let index=Math.round(c.scrollLeft/c.clientWidth);
activeImageIndex[id]=index;

dots.forEach(d=>d.classList.remove("active"));
if(dots[index]) dots[index].classList.add("active");
});
}

/* WHATSAPP */
window.buy=function(id,name,price){

let p=products.find(x=>x.id===id);
let index=activeImageIndex[id]||0;
let img=p.images[index]||"";

let msg=`Hello 👋,

I want to order this Product:

🛍️ Product: ${name}
💰 Price: ₦${price}

🖼️ Selected Image:
${img}

Is it available?`;

window.open("https://wa.me/2349114738932?text="+encodeURIComponent(msg));
};

/* UPLOAD */
window.upload=function(){
cloudinary.openUploadWidget({
cloudName:"db92r6j9z",
uploadPreset:"ummuhalti",
multiple:true
},(e,r)=>{
if(r && r.event==="success"){
images.push(r.info.secure_url);
alert("Uploaded ✔");
}
});
};

/* SAVE PRODUCT */
window.saveProduct=async function(){

if(!pname.value||!price.value){
alert("Fill all fields");
return;
}

await addDoc(collection(db,"products"),{
name:pname.value,
price:price.value,
category:category.value.toLowerCase().trim(),
images:images,
date:Date.now()
});

alert("Product saved ✔");

pname.value="";
price.value="";
images=[];

await loadProducts();
loadAdminProducts();
};

/* ADMIN LIST */
window.loadAdminProducts=function(){

let c=delCat.value;
adminList.innerHTML="";

let list=products.filter(p=>p.category===c.toLowerCase().trim());

if(list.length===0){
adminList.innerHTML="<p>No products</p>";
return;
}

list.forEach(p=>{
adminList.innerHTML+=`
<div class="item">
${p.name}
<button class="del" onclick="del('${p.id}')">Delete</button>
</div>
`;
});
};

/* DELETE PRODUCT */
window.del=async function(id){
await deleteDoc(doc(db,"products",id));
alert("Deleted ✔");
await loadProducts();
loadAdminProducts();
};

/* CATEGORY */
window.addCategory=async function(){

if(!newCat.value){
alert("Enter category");
return;
}

await addDoc(collection(db,"categories"),{
name:newCat.value
});

alert("Category added ✔");
newCat.value="";
await loadCategories();
};

window.deleteCategory=async function(){

const snap=await getDocs(collection(db,"categories"));

snap.forEach(async d=>{
if(d.data().name===delCat2.value){
await deleteDoc(doc(db,"categories",d.id));
}
});

alert("Category deleted ✔");
await loadCategories();
};

</script>

</body>
</html>
