<!DOCTYPE html>
<html>
<head>
  <title>LUXURY HEAVEN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;padding-top:80px}

/* HEADER */
.top{position:fixed;top:0;width:100%;height:45px;background:#111;color:white;display:flex;align-items:center;z-index:9999}
.logo{height:45px}
.marquee{margin-left:100px;white-space:nowrap;animation:move 12s linear infinite}
@keyframes move{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}

/* CATEGORY */
.bar{position:fixed;top:45px;width:100%;background:#222;display:flex;overflow-x:auto}
.cat{color:white;padding:8px 12px;margin:5px;cursor:pointer}

/* CARD */
.card{background:white;margin:10px;padding:10px;border-radius:12px}

/* CAROUSEL */
.carousel{display:flex;overflow-x:auto;scroll-snap-type:x mandatory}
.carousel img{min-width:100%;height:320px;object-fit:cover;scroll-snap-align:center}
.carousel::-webkit-scrollbar{display:none}

/* DOTS */
.dots{text-align:center;margin-top:5px}
.dot{display:inline-block;width:8px;height:8px;margin:3px;border-radius:50%;background:#bbb}
.dot.active{background:#25D366}

/* PRICE */
.price{background:#111;color:white;padding:10px;text-align:center;margin-top:10px;border-radius:8px}

/* BUY */
.buy{width:100%;padding:10px;background:#25D366;color:white;border:none;margin-top:10px;border-radius:10px}

/* ADMIN */
.admin{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:white;z-index:99999;padding:10px;overflow:auto}
input,select{width:100%;padding:10px;margin:5px 0}
button{width:100%;padding:10px;margin-top:5px;border:none;border-radius:8px}
.green{background:green;color:white}
.red{background:red;color:white}
</style>
</head>

<body>

<!-- HEADER -->
<div class="top">
  <img src="logo1.png" class="logo">
  <div class="marquee">✨ LUXURY HEAVEN ✨</div>
  <div onclick="openAdmin()" style="margin-left:auto;padding:10px;cursor:pointer">🔒</div>
</div>

<!-- CATEGORY -->
<div class="bar" id="bar"></div>

<!-- PRODUCTS -->
<div id="view"></div>

<!-- ADMIN -->
<div class="admin" id="admin">

<h2>Admin Dashboard</h2>

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<select id="cat"></select>

<button class="green" onclick="upload()">Upload Images</button>
<button class="green" onclick="save()">Save Product</button>

<hr>

<h3>Category Management</h3>
<input id="newCat" placeholder="New Category">
<button class="green" onclick="addCategory()">Add Category</button>

<select id="deleteCat"></select>
<button class="red" onclick="deleteCategory()">Delete Category</button>

<hr>

<h3>Delete Products by Category</h3>
<button class="green" onclick="showDeleteList()">Load Products</button>
<div id="list"></div>

<button class="red" onclick="closeAdmin()">Close</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyD40daowTCCVrKr1kWI6krf9nB7OHp8mWU",
  authDomain: "luxury-heaven-c24df.firebaseapp.com",
  projectId: "luxury-heaven-c24df",
  storageBucket: "luxury-heaven-c24df.firebasestorage.app",
  messagingSenderId: "277279766368",
  appId: "1:277279766368:web:2f5858b54f58d1df629005"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* CLOUDINARY */
const cloudName = "db92r6j9z";
const uploadPreset = "ummuhalti";

/* DATA */
let products = [];
let categories = [];
let images = [];

/* INIT */
window.onload = async ()=>{
  await loadCategories();
  await loadProducts();
};

/* LOAD CATEGORIES */
async function loadCategories(){
  const snap = await getDocs(collection(db,"categories"));
  categories = [];

  snap.forEach(d=>categories.push(d.data().name));

  let bar = document.getElementById("bar");
  let sel = document.getElementById("cat");
  let del = document.getElementById("deleteCat");

  bar.innerHTML="";
  sel.innerHTML="";
  del.innerHTML="";

  categories.forEach(c=>{
    bar.innerHTML += `<div class="cat" onclick="filter('${c}')">${c}</div>`;
    sel.innerHTML += `<option>${c}</option>`;
    del.innerHTML += `<option>${c}</option>`;
  });
}

/* LOAD PRODUCTS */
async function loadProducts(){
  const snap = await getDocs(collection(db,"products"));
  products = [];

  snap.forEach(d=>products.push({...d.data(),id:d.id}));

  render(products);
}

/* RENDER */
function render(list){
  let view = document.getElementById("view");
  view.innerHTML="";

  list.forEach((p,i)=>{
    view.innerHTML += `
      <div class="card">

        <div class="carousel" id="car${i}">
          ${(p.images||[]).map(img=>`<img src="${img}">`).join("")}
        </div>

        <div class="dots" id="dot${i}"></div>

        <div class="price">₦ ${p.price}</div>

        <button class="buy" onclick="buyNow(${i})">
        BUY NOW
        </button>

      </div>
    `;
  });

  setTimeout(setupCarousel,100);
}

/* CAROUSEL */
function setupCarousel(){
  products.forEach((p,i)=>{
    let car=document.getElementById("car"+i);
    let box=document.getElementById("dot"+i);
    if(!car) return;

    let imgs=car.querySelectorAll("img");
    box.innerHTML="";

    imgs.forEach((_,x)=>{
      let d=document.createElement("span");
      d.className="dot"+(x===0?" active":"");
      box.appendChild(d);
    });

    let dots=box.querySelectorAll(".dot");

    car.addEventListener("scroll",()=>{
      let index=Math.round(car.scrollLeft/car.clientWidth);
      dots.forEach(d=>d.classList.remove("active"));
      if(dots[index]) dots[index].classList.add("active");
    });
  });
}

/* BUY WITH ACTIVE IMAGE */
window.buyNow = function(index){
  let p = products[index];

  let car = document.getElementById("car" + index);
  let currentIndex = Math.round(car.scrollLeft / car.clientWidth);
  let selectedImage = p.images[currentIndex] || p.images[0];

  let msg = `Hello 👋,

I want to order this Product:

🧵 Category: ${p.category.toUpperCase()}
🛍️ Product: ${p.name}
💰 Price: ₦${p.price}

🖼️ Selected Image:
${selectedImage}

Is this available? I want to buy.`;

  window.open("https://wa.me/234911473893?text=" + encodeURIComponent(msg));
};

/* FILTER */
window.filter = c=>{
  render(products.filter(p=>p.category===c));
};

/* SAVE PRODUCT */
window.save = async ()=>{
  let nameVal = document.getElementById("name").value.trim();
  let priceVal = document.getElementById("price").value.trim();
  let catVal = document.getElementById("cat").value;

  if(!nameVal || !priceVal || images.length === 0){
    alert("Fill all fields + upload image");
    return;
  }

  await addDoc(collection(db,"products"),{
    name:nameVal,
    price:priceVal,
    category:catVal,
    images:[...images],
    date:Date.now()
  });

  alert("Product uploaded successfully ✅");

  images=[];
  document.getElementById("name").value="";
  document.getElementById("price").value="";

  loadProducts();
};

/* DELETE LIST */
window.showDeleteList = ()=>{
  let selected = document.getElementById("deleteCat").value;
  let box = document.getElementById("list");
  box.innerHTML="";

  let filtered = products.filter(p=>p.category===selected);

  filtered.forEach(p=>{
    box.innerHTML += `
      <div style="display:flex;gap:10px;background:#eee;padding:8px;margin:5px;border-radius:8px;">
        <img src="${p.images?.[0]||''}" width="40">
        <div style="flex:1">${p.name}</div>
        <button class="red" onclick="del('${p.id}')">Delete</button>
      </div>
    `;
  });
};

/* DELETE PRODUCT */
window.del = async (id)=>{
  await deleteDoc(doc(db,"products",id));
  alert("Deleted ✅");
  loadProducts();
  showDeleteList();
};

/* ADD CATEGORY */
window.addCategory = async ()=>{
  let newC = document.getElementById("newCat").value.trim().toLowerCase();

  if(!newC) return;

  if(categories.includes(newC)){
    alert("Category exists");
    return;
  }

  await addDoc(collection(db,"categories"),{name:newC});
  document.getElementById("newCat").value="";
  loadCategories();
};

/* DELETE CATEGORY */
window.deleteCategory = async ()=>{
  let selected = document.getElementById("deleteCat").value;

  const snap = await getDocs(collection(db,"categories"));

  snap.forEach(async d=>{
    if(d.data().name === selected){
      await deleteDoc(doc(db,"categories",d.id));
    }
  });

  loadCategories();
};

/* CLOUDINARY */
window.upload = ()=>{
  cloudinary.openUploadWidget({
    cloudName,
    uploadPreset,
    multiple:true
  },(e,r)=>{
    if(r?.event==="success"){
      images.push(r.info.secure_url);
      alert("Image uploaded ✔");
    }
  });
};

/* ADMIN */
window.openAdmin = ()=>{
  let pass = prompt("Password:");
  if(pass==="1234") admin.style.display="block";
};

window.closeAdmin = ()=>admin.style.display="none";

</script>

</body>
</html>
