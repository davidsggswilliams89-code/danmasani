<!DOCTYPE html>
<html>
<head>
  <title>LUXURY HEAVEN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

  <style>
body{margin:0;font-family:Arial;background:#f5f5f5;padding-top:80px}

.top{position:fixed;top:0;width:100%;height:45px;background:#111;color:white;display:flex;align-items:center;z-index:9999}
.logo{height:45px}
.marquee{margin-left:100px;white-space:nowrap;animation:move 12s linear infinite}
@keyframes move{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}

.bar{position:fixed;top:45px;width:100%;background:#222;display:flex;overflow-x:auto}
.btn{color:white;padding:8px;margin:5px;cursor:pointer}

.card{background:white;margin:10px;padding:10px;border-radius:10px}
.card img{width:100%;height:300px;object-fit:cover;border-radius:10px}

.price{background:#111;color:white;padding:10px;text-align:center;margin-top:10px;border-radius:8px}

.buy{width:100%;padding:10px;background:#25D366;color:white;border:none;margin-top:10px;border-radius:10px}

.admin{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:white;z-index:99999;padding:10px;overflow:auto}

input,select{width:100%;padding:10px;margin:5px 0}

button{width:100%;padding:10px;border:none;border-radius:8px;margin-top:5px}
.green{background:green;color:white}
.red{background:red;color:white}
</style>
</head>

<body>

<!-- HEADER -->
<div class="top">
  <img src="logo1.png" class="logo">
  <div class="marquee">✨ LUXURY HEAVEN ✨</div>
  <div onclick="openAdmin()" style="margin-left:auto;padding:10px;cursor:pointer">🔒</div>
</div>

<!-- CATEGORY -->
<div class="bar" id="catBar"></div>

<!-- PRODUCTS -->
<div id="view"></div>

<!-- ADMIN -->
<div class="admin" id="admin">

<h2>Admin</h2>

<p id="stats"></p>

<input id="pName" placeholder="Name">
<input id="pPrice" placeholder="Price">
<select id="pCat"></select>

<button class="green" onclick="uploadImg()">Upload Images</button>
<button class="green" onclick="saveProduct()">Save</button>

<hr>

<h3>Products</h3>
<div id="list"></div>

<button class="red" onclick="closeAdmin()">Close</button>

</div>

<script type="module">

/* FIREBASE */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD40daowTCCVrKr1kWI6krf9nB7OHp8mWU",
  authDomain: "luxury-heaven-c24df.firebaseapp.com",
  projectId: "luxury-heaven-c24df",
  storageBucket: "luxury-heaven-c24df.firebasestorage.app",
  messagingSenderId: "277279766368",
  appId: "1:277279766368:web:2f5858b54f58d1df629005"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* DATA */
let products = [];
let categories = [];
let images = [];

/* LOAD */
window.onload = async () => {
  await loadCategories();
  await loadProducts();
};

/* CATEGORIES */
async function loadCategories(){
  const snap = await getDocs(collection(db,"categories"));
  categories = [];

  snap.forEach(d=>categories.push(d.data().name));

  let bar = document.getElementById("catBar");
  let sel = document.getElementById("pCat");

  bar.innerHTML="";
  sel.innerHTML="";

  categories.forEach(c=>{
    bar.innerHTML += `<div class="btn" onclick="filter('${c}')">${c}</div>`;
    sel.innerHTML += `<option>${c}</option>`;
  });
}

/* PRODUCTS */
async function loadProducts(){
  const snap = await getDocs(collection(db,"products"));
  products = [];

  snap.forEach(d=>products.push({...d.data(), id:d.id}));

  render(products);
  updateAdmin();
}

/* SHOW */
function render(list){
  let view = document.getElementById("view");
  view.innerHTML="";

  list.forEach(p=>{
    view.innerHTML += `
      <div class="card">
        <img src="${p.images?.[0]||''}">
        <div class="price">₦ ${p.price}</div>
        <button class="buy">BUY</button>
      </div>
    `;
  });
}

window.filter = (c)=>{
  render(products.filter(p=>p.category===c));
};

/* ADD PRODUCT */
window.saveProduct = async ()=>{
  await addDoc(collection(db,"products"),{
    name:pName.value,
    price:pPrice.value,
    category:pCat.value,
    images:[...images],
    date:Date.now()
  });

  images=[];
  loadProducts();
};

/* DELETE */
window.del = async (id)=>{
  await deleteDoc(doc(db,"products",id));
  loadProducts();
};

/* CLOUDINARY */
window.uploadImg = ()=>{
  cloudinary.openUploadWidget({
    cloudName:"db92r6j9z",
    uploadPreset:"ummuhalti",
    multiple:true
  },(e,r)=>{
    if(r?.event==="success"){
      images.push(r.info.secure_url);
      alert("Uploaded");
    }
  });
};

/* ADMIN */
window.openAdmin = ()=>{
  let pass = prompt("Password");
  if(pass==="1234"){
    admin.style.display="block";
  }
};

window.closeAdmin = ()=>{
  admin.style.display="none";
};

/* SAFE STATS (NO CRASH) */
function updateAdmin(){
  try{
    document.getElementById("stats").innerText =
      `Products: ${products.length} | Categories: ${categories.length}`;

    let list = document.getElementById("list");
    list.innerHTML="";

    products.forEach(p=>{
      list.innerHTML += `
        <div style="display:flex;gap:10px;background:#eee;padding:8px;margin:5px">
          <img src="${p.images?.[0]||''}" width="40">
          <div style="flex:1">${p.name}</div>
          <button class="red" onclick="del('${p.id}')">X</button>
        </div>
      `;
    });
  }catch(e){
    console.log("Admin error safe ignored",e);
  }
}

</script>

</body>
</html>
