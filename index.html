<!DOCTYPE html>
<html>
<head>
  <title>Luxury Heaven Ecommerce</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background: #111;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .container {
      padding: 15px;
      max-width: 900px;
      margin: auto;
    }

    .form {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
    }

    .slider {
      width: 100%;
      height: 160px;
      overflow: hidden;
      border-radius: 10px;
    }

    .slider img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: none;
    }

    .slider img.active {
      display: block;
    }
  </style>
</head>

<body>

<header>Luxury Heaven Ecommerce</header>

<div class="container">

  <div class="form">
    <h3>Add Product (Multiple Images)</h3>
    <input id="name" placeholder="Product Name">
    <input id="price" placeholder="Price">
    <input type="file" id="image" multiple>

    <button onclick="uploadProduct()">Upload Product</button>
  </div>

  <div class="grid" id="products"></div>

</div>

<script>
  // ---------------- FIREBASE ----------------
  const firebaseConfig = {
    apiKey: "AIzaSyD40daowTCCVrKr1kWI6krf9nB7OHp8mWU",
    authDomain: "luxury-heaven-c24df.firebaseapp.com",
    projectId: "luxury-heaven-c24df",
    storageBucket: "luxury-heaven-c24df.firebasestorage.app",
    messagingSenderId: "277279766368",
    appId: "1:277279766368:web:2f5858b54f58d1df629005"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // ---------------- CLOUDINARY ----------------
  const cloudName = "db92r6j9z";
  const uploadPreset = "ummuhalti";

  async function uploadToCloudinary(file) {
    let formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", uploadPreset);

    let res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
      method: "POST",
      body: formData
    });

    let data = await res.json();
    return data.secure_url;
  }

  // Upload multiple images
  async function uploadProduct() {
    let name = document.getElementById("name").value;
    let price = document.getElementById("price").value;
    let files = document.getElementById("image").files;

    if (!name || !price || files.length === 0) {
      alert("Fill all fields");
      return;
    }

    let imageUrls = [];

    for (let i = 0; i < files.length; i++) {
      let url = await uploadToCloudinary(files[i]);
      imageUrls.push(url);
    }

    await db.collection("products").add({
      name,
      price,
      images: imageUrls,
      time: Date.now()
    });

    alert("Product uploaded!");
    loadProducts();
  }

  // Auto slider
  function startSlider(id) {
    let imgs = document.querySelectorAll(`#${id} img`);
    let index = 0;

    setInterval(() => {
      imgs.forEach(img => img.classList.remove("active"));
      imgs[index].classList.add("active");
      index = (index + 1) % imgs.length;
    }, 2000);
  }

  // Load products
  function loadProducts() {
    db.collection("products").orderBy("time", "desc").onSnapshot(snapshot => {
      let html = "";
      let count = 0;

      snapshot.forEach(doc => {
        let p = doc.data();
        let sliderId = "slider" + count++;

        let imagesHtml = p.images.map((img, i) =>
          `<img src="${img}" class="${i === 0 ? 'active' : ''}">`
        ).join("");

        html += `
          <div class="card">
            <div class="slider" id="${sliderId}">
              ${imagesHtml}
            </div>
            <h4>${p.name}</h4>
            <p>₦${p.price}</p>
          </div>
        `;
      });

      document.getElementById("products").innerHTML = html;

      setTimeout(() => {
        for (let i = 0; i < 100; i++) {
          let slider = document.getElementById("slider" + i);
          if (slider) startSlider("slider" + i);
        }
      }, 500);
    });
  }

  loadProducts();
</script>

</body>
</html>
