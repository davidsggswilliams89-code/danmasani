<!DOCTYPE html>
<html>
<head>
<title>LUXURY HEAVEN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;padding-top:80px;}

.top-bar{
position:fixed;top:0;width:100%;height:45px;
background:#111;color:white;display:flex;
align-items:center;padding:0 10px;z-index:3000;
}

.admin-icon{margin-left:auto;cursor:pointer;}

.category-bar{
position:fixed;top:45px;width:100%;height:40px;
background:#222;display:flex;overflow-x:auto;
}

.category-btn{
color:white;padding:6px 14px;margin:5px;
border-radius:20px;cursor:pointer;
white-space:nowrap;
}
.category-btn.active{background:#25D366;}

.view{display:none;padding:10px;}
.active-view{display:block;}

.card{background:white;border-radius:12px;padding:10px;margin:10px 0;}

.price{background:#111;color:white;padding:10px;text-align:center;border-radius:8px;}

.admin{
display:none;position:fixed;top:0;left:0;
width:100%;height:100%;background:white;
z-index:9999;padding:10px;overflow:auto;
}

input,select{width:100%;padding:10px;margin:5px 0;}

.btn{width:100%;padding:10px;background:green;color:white;border:none;margin-top:5px;}
.del-btn{background:red;color:white;border:none;padding:6px;margin-top:5px;}

.preview img{
width:100px;height:100px;object-fit:cover;
margin:5px;border-radius:10px;
}
</style>
</head>

<body>

<div class="top-bar">
LUXURY HEAVEN
<div class="admin-icon" onclick="openAdmin()">🔒</div>
</div>

<div class="category-bar" id="categoryBar"></div>

<div id="aboutView" class="view active-view">
<div class="card">
<h2 style="text-align:center;">✨ About Luxury Heaven</h2>
<p style="text-align:center;">Premium fashion store in Nigeria</p>
</div>
</div>

<div id="productView" class="view"></div>

<!-- ADMIN -->
<div class="admin" id="admin">

<h3>ADMIN PANEL</h3>

<h4>Add Category</h4>
<input id="newCat" placeholder="Category name">
<button class="btn" onclick="addCategory()">Add Category</button>

<hr>

<h4>Add Product</h4>

<input id="pname" placeholder="Product name">
<input id="price" placeholder="Price">

<select id="pcat"></select>

<button class="btn" onclick="uploadImages()">📸 Upload Images</button>

<div class="preview" id="preview"></div>

<button class="btn" onclick="saveProduct()">Save Product</button>

<hr>

<button class="del-btn" onclick="closeAdmin()">Close</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA6ZaMnWKJEvSUlJgh31tU6rj8CvuietuM",
authDomain: "bob-26647.firebaseapp.com",
projectId: "bob-26647",
storageBucket: "bob-26647.firebasestorage.app",
messagingSenderId: "468659293220",
appId: "1:468659293220:web:507832347dc70ab78ddcb1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let categories=[];
let products=[];
let uploadedImages=[];

/* ADMIN OPEN/CLOSE */
window.openAdmin=()=>admin.style.display="block";
window.closeAdmin=()=>admin.style.display="none";

/* LOAD */
window.onload=async()=>{
await loadCategories();
await loadProducts();
renderCategoryBar();
};

/* CATEGORIES */
async function loadCategories(){
categories=[];
let snap=await getDocs(collection(db,"categories"));
snap.forEach(d=>categories.push(d.data().name));

let sel=document.getElementById("pcat");
sel.innerHTML="";
categories.forEach(c=>{
sel.innerHTML+=`<option>${c}</option>`;
});
}

/* PRODUCTS */
async function loadProducts(){
products=[];
let snap=await getDocs(collection(db,"products"));
snap.forEach(d=>products.push(d.data()));
}

/* CATEGORY */
function renderCategoryBar(){
let bar=document.getElementById("categoryBar");
bar.innerHTML="<div class='category-btn active'>ABOUT</div>";

categories.forEach(c=>{
bar.innerHTML+=`<div class='category-btn'>${c}</div>`;
});
}

/* ⭐ CLOUDINARY UPLOAD (MOBILE GALLERY) */
window.uploadImages=()=>{
cloudinary.openUploadWidget(
{
cloudName: "db92r6j9z",   // 🔴 PUT YOUR CLOUDINARY CLOUD NAME
uploadPreset: "ummuhalti", // 🔴 PUT YOUR UPLOAD PRESET
sources: ["local","camera"],
multiple: true,
resourceType: "image"
},
(error,result)=>{
if(!error && result.event==="success"){
uploadedImages.push(result.info.secure_url);

document.getElementById("preview").innerHTML =
uploadedImages.map(img=>`<img src="${img}">`).join("");
}
});
};

/* SAVE PRODUCT */
window.saveProduct=async()=>{

let name=document.getElementById("pname").value;
let price=document.getElementById("price").value;
let cat=document.getElementById("pcat").value;

if(!name||!price||!cat||uploadedImages.length===0){
alert("Fill all fields + upload images");
return;
}

await addDoc(collection(db,"products"),{
name,
price,
category:cat,
images:uploadedImages,
date:Date.now()
});

alert("Product saved!");

document.getElementById("pname").value="";
document.getElementById("price").value="";
uploadedImages=[];
document.getElementById("preview").innerHTML="";
};

</script>

</body>
</html>
