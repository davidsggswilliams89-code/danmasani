<!DOCTYPE html>
<html>
<head>
<title>LUXURY HEAVEN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
padding-top:85px;
}

.top{
position:fixed;
top:0;
width:100%;
height:45px;
background:#111;
color:white;
display:flex;
align-items:center;
z-index:9999;
}

.logo{height:45px}

.marquee{
margin-left:90px;
white-space:nowrap;
animation:move 12s linear infinite;
}

@keyframes move{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

.bar{
position:fixed;
top:45px;
width:100%;
background:#222;
display:flex;
overflow-x:auto;
z-index:9998;
}

.cat{
color:white;
padding:8px 14px;
margin:5px;
border-radius:20px;
cursor:pointer;
white-space:nowrap;
}

.cat.active{background:#25D366}

.view{margin-top:90px}

.card{
background:white;
margin:10px;
padding:10px;
border-radius:12px;
}

.price{
background:#111;
color:white;
padding:10px;
text-align:center;
border-radius:8px;
margin-top:10px;
}

button{
width:100%;
padding:10px;
margin:5px 0;
cursor:pointer;
}

.green{background:green;color:white}
.red{background:red;color:white}

.admin{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
z-index:99999;
padding:20px;
overflow:auto;
}

.admin-item{
display:flex;
justify-content:space-between;
align-items:center;
background:#eee;
padding:8px;
margin:5px 0;
border-radius:8px;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="top">
<img src="logo1.png" class="logo">
<div class="marquee">✨ LUXURY HEAVEN ✨</div>
<div style="margin-left:auto;padding:10px;cursor:pointer" onclick="openAdmin()">🔒</div>
</div>

<!-- CATEGORY -->
<div class="bar" id="bar"></div>

<!-- PRODUCTS -->
<div id="view"></div>

<!-- ADMIN -->
<div class="admin" id="admin">

<h2>Admin Panel</h2>

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<select id="cat"></select>

<button class="green" onclick="upload()">Upload Images</button>
<button class="green" onclick="saveProduct()">Save Product</button>

<hr>

<h3>Delete Products</h3>
<select id="delCat" onchange="loadAdminProducts()"></select>

<div id="adminList"></div>

<hr>

<input id="newCat" placeholder="New Category">
<button class="green" onclick="addCategory()">Add Category</button>

<select id="delCat2"></select>
<button class="red" onclick="deleteCategory()">Delete Category</button>

<hr>

<button class="red" onclick="closeAdmin()">Close</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
addDoc,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyD40daowTCCVrKr1kWI6krf9nB7OHp8mWU",
authDomain: "luxury-heaven-c24df.firebaseapp.com",
projectId: "luxury-heaven-c24df",
storageBucket: "luxury-heaven-c24df.firebasestorage.app",
messagingSenderId: "277279766368",
appId: "1:277279766368:web:2f5858b54f58d1df629005"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* STATE */
let products = [];
let categories = [];
let uploadedImages = [];
let activeCategory = "";

/* OPEN ADMIN */
window.openAdmin = () => {
document.getElementById("admin").style.display="block";
};

window.closeAdmin = () => {
document.getElementById("admin").style.display="none";
};

/* LOAD PRODUCTS */
async function loadProducts(){
const snap = await getDocs(collection(db,"products"));

products = [];

snap.forEach(d=>{
products.push({
id: d.id,
...d.data()
});
});
}

/* LOAD CATEGORIES */
async function loadCategories(){

const snap = await getDocs(collection(db,"categories"));

categories = [];

let bar = document.getElementById("bar");
let sel = document.getElementById("cat");
let del = document.getElementById("delCat");
let del2 = document.getElementById("delCat2");

bar.innerHTML="";
sel.innerHTML="";
del.innerHTML="";
del2.innerHTML="";

/* ABOUT (optional) */

/* CATEGORIES */
snap.forEach(d=>{
let c = d.data().name;
categories.push(c);

/* BUTTON */
let btn = document.createElement("div");
btn.className="cat";
btn.innerText=c;

btn.onclick = () => {
document.querySelectorAll(".cat").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

activeCategory = c.toLowerCase();
renderProducts(activeCategory);
};

bar.appendChild(btn);

/* ADMIN SELECT */
sel.innerHTML += `<option>${c}</option>`;
del.innerHTML += `<option>${c}</option>`;
del2.innerHTML += `<option>${c}</option>`;
});

}

/* CATEGORY → PRODUCTS */
function renderProducts(category){

let view = document.getElementById("view");
view.innerHTML="";

if(!category) return;

let filtered = products.filter(p =>
(p.category || "").toLowerCase().trim() === category.toLowerCase().trim()
);

filtered.forEach(p=>{
view.innerHTML += `
<div class="card">
<h3>${p.name}</h3>
<p class="price">₦ ${p.price}</p>
</div>
`;
});

}

/* ADMIN PRODUCT LIST */
window.loadAdminProducts = function(){

let cat = document.getElementById("delCat").value;
let box = document.getElementById("adminList");

box.innerHTML="";

let filtered = products.filter(p =>
(p.category || "") === cat
);

filtered.forEach(p=>{
box.innerHTML += `
<div class="admin-item">
<div>${p.name}</div>
<button class="red" onclick="deleteProduct('${p.id}')">Delete</button>
</div>
`;
});

};

/* DELETE PRODUCT */
window.deleteProduct = async function(id){

await deleteDoc(doc(db,"products",id));

alert("Product deleted ✔");

await loadProducts();
loadAdminProducts();
};

/* SAVE PRODUCT */
window.saveProduct = async function(){

await addDoc(collection(db,"products"),{
name:name.value,
price:price.value,
category:cat.value,
images:uploadedImages,
date:Date.now()
});

alert("Product saved ✔");

name.value="";
price.value="";
uploadedImages=[];

await loadProducts();
};

/* UPLOAD */
window.upload = function(){
cloudinary.openUploadWidget({
cloudName:"db92r6j9z",
uploadPreset:"ummuhalti",
multiple:true
},(e,r)=>{
if(r && r.event==="success"){
uploadedImages.push(r.info.secure_url);
alert("Uploaded ✔");
}
});
};

/* CATEGORY */
window.addCategory = async function(){
await addDoc(collection(db,"categories"),{
name:newCat.value
});
alert("Category added ✔");
loadCategories();
};

window.deleteCategory = async function(){

const snap = await getDocs(collection(db,"categories"));

snap.forEach(async d=>{
if(d.data().name === delCat2.value){
await deleteDoc(doc(db,"categories",d.id));
}
});

alert("Category deleted ✔");
loadCategories();
};

/* INIT */
window.onload = async () => {
await loadCategories();
await loadProducts();
};

</script>

</body>
</html>
