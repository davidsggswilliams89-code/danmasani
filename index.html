<!DOCTYPE html>
<html>
<head>
<title>BOB TEXTILE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
padding-top:80px;
}

/* HEADER */
.top-bar{
position:fixed;
top:0;
width:100%;
height:45px;
background:#111;
color:white;
display:flex;
align-items:center;
padding:0 10px;
z-index:3000;
}

.admin-icon{margin-left:auto;cursor:pointer}

/* CATEGORY */
.category-bar{
position:fixed;
top:45px;
width:100%;
height:40px;
background:#222;
display:flex;
overflow-x:auto;
z-index:2000;
}

.category-btn{
color:white;
padding:6px 14px;
margin:5px;
border-radius:20px;
cursor:pointer;
white-space:nowrap;
}
.category-btn.active{background:#25D366}

/* VIEW */
.view{display:none;padding:10px;}
.active-view{display:block}

/* CARD */
.card{
background:white;
border-radius:12px;
padding:10px;
margin:10px 0;
}

/* CAROUSEL */
.carousel{
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;
}
.carousel img{
min-width:100%;
height:300px;
object-fit:cover;
scroll-snap-align:center;
border-radius:10px;
}
.carousel::-webkit-scrollbar{display:none}

/* TESTIMONIAL IMAGE */
#testimonialCarousel img{
object-fit:contain;
background:#fff;
}

/* DOTS */
.dots{text-align:center;margin-top:5px}
.dot{
height:8px;width:8px;
background:#bbb;
border-radius:50%;
display:inline-block;
margin:0 3px;
cursor:pointer;
}
.dot.active{background:#25D366}

/* PRICE */
.price{
background:#111;
color:white;
padding:10px;
text-align:center;
border-radius:8px;
margin-top:8px;
}

/* BUTTON */
.buy-btn{
background:#25D366;
color:white;
padding:10px;
border:none;
width:100%;
border-radius:10px;
margin-top:8px;
cursor:pointer;
}

/* ADMIN */
.admin{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
z-index:9999;
padding:10px;
overflow:auto;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
}

.btn{
width:100%;
padding:10px;
background:green;
color:white;
border:none;
margin-top:5px;
cursor:pointer;
}

.del-btn{
background:red;
color:white;
border:none;
padding:6px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="top-bar">
BOB TEXTILE
<div class="admin-icon" onclick="openAdmin()">🔒</div>
</div>

<!-- CATEGORY -->
<div class="category-bar" id="categoryBar"></div>

<!-- ABOUT -->
<div id="aboutView" class="view active-view">

<div class="card">

<h3 style="text-align:center;">What Our Customers Say 💬</h3>

<div class="carousel" id="testimonialCarousel"></div>
<div class="dots" id="testimonialDots"></div>

<hr>

<h2>About Us</h2>
<p>BOB TEXTILE is your trusted fashion store for quality fabrics and styles.</p>

</div>
</div>

<!-- PRODUCTS -->
<div id="productView" class="view"></div>

<!-- ADMIN -->
<div class="admin" id="admin">

<h3>Admin Panel</h3>

<input id="pname" placeholder="Product name">
<input id="price" placeholder="Price">
<select id="category"></select>

<button class="btn" onclick="uploadImages()">Upload Images</button>
<button class="btn" onclick="saveProduct()">Save Product</button>

<hr>

<h3>Delete Products</h3>
<select id="delCat" onchange="loadAdminProducts()"></select>
<div id="adminList"></div>

<hr>

<h3>Testimonials</h3>
<button class="btn" onclick="uploadTestimonial()">Upload Testimonial</button>

<hr>

<button class="del-btn" onclick="closeAdmin()">Close</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
addDoc,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
apiKey: "AIzaSyD40daowTCCVrKr1kWI6krf9nB7OHp8mWU",
authDomain: "luxury-heaven-c24df.firebaseapp.com",
projectId: "luxury-heaven-c24df",
storageBucket: "luxury-heaven-c24df.firebasestorage.app",
messagingSenderId: "277279766368",
appId: "1:277279766368:web:2f5858b54f58d1df629005"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* STATE */
let products=[],categories=[],images=[],active="";
let testimonials=[],tIndex=0,tAuto;

/* ADMIN */
window.openAdmin=()=>admin.style.display="block";
window.closeAdmin=()=>admin.style.display="none";

/* INIT */
window.onload=()=>{
loadCategories();
loadProducts();
loadTestimonials();
};

/* CATEGORIES */
async function loadCategories(){
categories=[];
let snap=await getDocs(collection(db,"categories"));
snap.forEach(d=>categories.push(d.data().name));
renderCategories();
fillAdmin();
}

function renderCategories(){
categoryBar.innerHTML="";
let about=document.createElement("div");
about.className="category-btn active";
about.innerText="ABOUT";
about.onclick=()=>show("about",about);
categoryBar.appendChild(about);

categories.forEach(c=>{
let btn=document.createElement("div");
btn.className="category-btn";
btn.innerText=c;
btn.onclick=()=>show(c,btn);
categoryBar.appendChild(btn);
});
}

function fillAdmin(){
category.innerHTML="";
delCat.innerHTML="";
categories.forEach(c=>{
category.innerHTML+=`<option>${c}</option>`;
delCat.innerHTML+=`<option>${c}</option>`;
});
}

/* PRODUCTS */
async function loadProducts(){
products=[];
let snap=await getDocs(collection(db,"products"));
snap.forEach(d=>products.push({id:d.id,...d.data()}));
}

/* SHOW */
function show(type,btn){
document.querySelectorAll(".category-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
active=type;

if(type==="about"){
aboutView.classList.add("active-view");
productView.classList.remove("active-view");
return;
}

aboutView.classList.remove("active-view");
productView.classList.add("active-view");
renderProducts();
}

/* RENDER PRODUCTS */
function renderProducts(){
productView.innerHTML="";
let list=products.filter(p=>p.category===active);

list.forEach(p=>{
productView.innerHTML+=`
<div class="card">
<div class="carousel">
${p.images.map(i=>`<img src="${i}">`).join("")}
</div>
<div class="price">₦${p.price}</div>
<button class="buy-btn">BUY NOW</button>
</div>`;
});
}

/* SAVE PRODUCT */
window.saveProduct=async()=>{
await addDoc(collection(db,"products"),{
name:pname.value,
price:price.value,
category:category.value,
images:images,
date:Date.now()
});
images=[];
loadProducts();
}

/* DELETE PRODUCT */
window.deleteProduct=async(id)=>{
await deleteDoc(doc(db,"products",id));
loadProducts();
loadAdminProducts();
}

/* ADMIN LIST */
window.loadAdminProducts=()=>{
let cat=delCat.value;
adminList.innerHTML="";
products.filter(p=>p.category===cat)
.forEach(p=>{
adminList.innerHTML+=`
<div>${p.name}
<button class="del-btn" onclick="deleteProduct('${p.id}')">X</button>
</div>`;
});
}

/* CLOUDINARY */
window.uploadImages=()=>{
cloudinary.openUploadWidget({
cloudName:"db92r6j9z",
uploadPreset:"ummuhalti",
multiple:true
},(e,r)=>{
if(r.event==="success") images.push(r.info.secure_url);
});
};

/* TESTIMONIALS */
async function loadTestimonials(){
testimonials=[];
let snap=await getDocs(collection(db,"testimonials"));
snap.forEach(d=>testimonials.push(d.data().image));
renderTestimonials();
}

function renderTestimonials(){
let box=document.getElementById("testimonialCarousel");
let dots=document.getElementById("testimonialDots");

box.innerHTML="";
dots.innerHTML="";

if(testimonials.length===0){
box.innerHTML="<p>No testimonials</p>";
return;
}

testimonials.forEach((img,i)=>{
box.innerHTML+=`<img src="${img}">`;

let d=document.createElement("span");
d.className="dot"+(i===0?" active":"");
d.onclick=()=>scrollTestimonial(i);
dots.appendChild(d);
});

scrollTestimonial(0);
startAuto();
}

function scrollTestimonial(i){
let box=document.getElementById("testimonialCarousel");
let dots=document.querySelectorAll("#testimonialDots .dot");

box.scrollTo({left:box.clientWidth*i,behavior:"smooth"});

dots.forEach(d=>d.classList.remove("active"));
if(dots[i]) dots[i].classList.add("active");

tIndex=i;
}

function startAuto(){
clearInterval(tAuto);
if(testimonials.length<=1)return;

tAuto=setInterval(()=>{
tIndex=(tIndex+1)%testimonials.length;
scrollTestimonial(tIndex);
},4000);
}

/* UPLOAD TESTIMONIAL */
window.uploadTestimonial=()=>{
cloudinary.openUploadWidget({
cloudName:"db92r6j9z",
uploadPreset:"ummuhalti",
multiple:true
},async(e,r)=>{
if(r.event==="success"){
await addDoc(collection(db,"testimonials"),{
image:r.info.secure_url
});
loadTestimonials();
}
});
};

</script>
</body>
</html>
