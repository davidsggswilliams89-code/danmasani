<!DOCTYPE html>
<html>
<head>
<title>LUXURY HEAVEN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;padding-top:80px;}

.top-bar{
position:fixed;top:0;width:100%;height:45px;
background:#111;color:white;display:flex;
align-items:center;padding:0 10px;z-index:3000;
}

.admin-icon{margin-left:auto;cursor:pointer;}

.category-bar{
position:fixed;top:45px;width:100%;height:40px;
background:#222;display:flex;overflow-x:auto;
}

.category-btn{
color:white;padding:6px 14px;margin:5px;
border-radius:20px;cursor:pointer;
}
.category-btn.active{background:#25D366;}

.view{display:none;padding:10px;}
.active-view{display:block;}

.card{
background:white;border-radius:12px;
padding:10px;margin:10px 0;
}

.carousel{
display:flex;
overflow-x:auto;
}
.carousel img{
min-width:100%;
height:300px;
object-fit:cover;
border-radius:10px;
}

.price{
background:#111;color:white;padding:10px;
text-align:center;border-radius:8px;margin-top:8px;
}

.buy-btn{
background:#25D366;color:white;
padding:12px;border:none;width:100%;
border-radius:12px;margin-top:10px;
display:flex;align-items:center;
justify-content:center;gap:8px;font-weight:bold;
cursor:pointer;
}

.admin{
display:none;position:fixed;top:0;left:0;
width:100%;height:100%;background:white;
z-index:9999;padding:10px;overflow:auto;
}

input,select{width:100%;padding:10px;margin:5px 0;}

.btn{width:100%;padding:10px;background:green;color:white;border:none;margin-top:5px;}
.del-btn{background:red;color:white;border:none;padding:6px;margin-top:5px;}
</style>
</head>

<body>

<div class="top-bar">
LUXURY HEAVEN
<div class="admin-icon" onclick="openAdmin()">🔒</div>
</div>

<div class="category-bar" id="categoryBar"></div>

<!-- ABOUT -->
<div id="aboutView" class="view active-view">
<div class="card">

<h3 style="text-align:center;">What Our Customers Say 💬</h3>
<div class="carousel" id="testimonialCarousel"></div>
<div id="testimonialDots"></div>

<hr>

<h2 style="text-align:center;">✨ About Luxury Heaven</h2>

<p>
Luxury Heaven by Aleesha is your trusted online fashion store for premium women's wear across Nigeria.
</p>

</div>
</div>

<!-- PRODUCTS -->
<div id="productView" class="view"></div>

<!-- ADMIN -->
<div class="admin" id="admin">
<h3>Admin Panel</h3>

<input id="pname" placeholder="Product name">
<input id="price" placeholder="Price">
<select id="category"></select>

<button class="btn" onclick="uploadImages()">Upload Images</button>
<button class="btn" onclick="saveProduct()">Save Product</button>

<hr>

<h3>Delete Product</h3>
<div id="productList"></div>

<hr>

<h3>Categories</h3>
<input id="newCat" placeholder="New category">
<button class="btn" onclick="addCategory()">Add Category</button>

<select id="catDelete"></select>
<button class="del-btn" onclick="deleteCategory()">Delete Category</button>

<hr>

<button class="del-btn" onclick="closeAdmin()">Close</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyD40daowTCCVrKr1kWI6krf9nB7OHp8mWU",
authDomain:"luxury-heaven-c24df.firebaseapp.com",
projectId:"luxury-heaven-c24df"
});

const db = getFirestore(app);

let categories=[],products=[],uploadedImages=[],active="about";

window.onload=async()=>{
await loadCategories();
await loadProducts();
};

/* CATEGORY LOAD */
async function loadCategories(){
categories=[];
let snap=await getDocs(collection(db,"categories"));
snap.forEach(d=>categories.push({id:d.id,...d.data()}));

renderCategoryBar();
fillAdminDropdowns();
}

/* CATEGORY BAR */
function renderCategoryBar(){
categoryBar.innerHTML="";

let about=document.createElement("div");
about.className="category-btn active";
about.innerText="ABOUT";
about.onclick=()=>show("about",about);
categoryBar.appendChild(about);

categories.forEach(c=>{
let btn=document.createElement("div");
btn.className="category-btn";
btn.innerText=c.name;
btn.onclick=()=>show(c.name,btn);
categoryBar.appendChild(btn);
});
}

/* SHOW VIEW */
function show(type,btn){
document.querySelectorAll(".category-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
active=type;

if(type==="about"){
aboutView.classList.add("active-view");
productView.classList.remove("active-view");
return;
}

aboutView.classList.remove("active-view");
productView.classList.add("active-view");

renderProducts();
}

/* PRODUCTS */
async function loadProducts(){
products=[];
let snap=await getDocs(collection(db,"products"));
snap.forEach(d=>products.push({id:d.id,...d.data()}));
}

function renderProducts(){
productView.innerHTML="";
let list=products.filter(p=>p.category===active);

list.forEach(p=>{
productView.innerHTML+=`
<div class="card">
<div class="carousel">
${p.images.map(img=>`<img src="${img}">`).join("")}
</div>

<div style="text-align:center;font-weight:bold;margin-top:10px;">
${p.name}
</div>

<div class="price">₦${p.price}</div>

<button class="buy-btn" onclick="buyNow('${p.name}','${p.price}','${p.category}')">
BUY NOW
</button>
</div>`;
});
}

/* BUY */
window.buyNow=(name,price,cat)=>{
let msg=`Hello 👋,

🧵 ${cat}
🛍️ ${name}
💰 ₦${price}

Is this available?`;

window.open("https://wa.me/2349114738932?text="+encodeURIComponent(msg));
};

/* ADMIN */
window.openAdmin=()=>admin.style.display="block";
window.closeAdmin=()=>admin.style.display="none";

/* DROPDOWNS */
function fillAdminDropdowns(){
category.innerHTML="";
catDelete.innerHTML="";

categories.forEach(c=>{
category.innerHTML+=`<option value="${c.name}">${c.name}</option>`;
catDelete.innerHTML+=`<option value="${c.id}">${c.name}</option>`;
});
}

/* ADD CATEGORY */
window.addCategory=async()=>{
await addDoc(collection(db,"categories"),{name:newCat.value});
newCat.value="";
loadCategories();
};

/* DELETE CATEGORY */
window.deleteCategory=async()=>{
await deleteDoc(doc(db,"categories",catDelete.value));
loadCategories();
};

/* CLOUDINARY */
window.uploadImages=()=>{
cloudinary.openUploadWidget({
cloudName:"db92r6j9z",
uploadPreset:"ummuhalti",
multiple:true
},(e,r)=>{
if(r && r.event==="success"){
uploadedImages.push(r.info.secure_url);
}
});
};

/* SAVE PRODUCT */
window.saveProduct=async()=>{
if(uploadedImages.length===0)return alert("Upload images first");

await addDoc(collection(db,"products"),{
name:pname.value,
price:price.value,
category:category.value,
images:uploadedImages,
date:Date.now()
});

uploadedImages=[];
pname.value="";
price.value="";
loadProducts();
};

</script>

</body>
</html>
