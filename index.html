<!DOCTYPE html>
<html>
<head>
<title>LUXURY HEAVEN V2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
padding-top:80px;
}

.header{
position:fixed;
top:0;
width:100%;
height:50px;
background:#111;
color:white;
display:flex;
align-items:center;
padding:0 10px;
z-index:999;
}

.header h3{margin:0;font-size:16px}

.bar{
position:fixed;
top:50px;
width:100%;
background:#222;
display:flex;
overflow-x:auto;
z-index:998;
}

.cat{
color:white;
padding:8px 14px;
margin:5px;
border-radius:20px;
cursor:pointer;
white-space:nowrap;
}

.cat.active{background:#25D366}

.view{margin-top:100px}

.card{
background:white;
margin:10px;
padding:10px;
border-radius:12px;
}

.price{
background:#111;
color:white;
padding:8px;
text-align:center;
border-radius:8px;
margin-top:8px;
}

button{
width:100%;
padding:10px;
margin-top:6px;
cursor:pointer;
border:none;
border-radius:8px;
}

.buy{background:#25D366;color:white}
.del{background:red;color:white}
.save{background:green;color:white}

.admin{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
z-index:9999;
padding:15px;
overflow:auto;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
background:#eee;
padding:8px;
margin:5px 0;
border-radius:8px;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<h3>LUXURY HEAVEN</h3>
<div style="margin-left:auto;cursor:pointer" onclick="openAdmin()">⚙️</div>
</div>

<!-- CATEGORY -->
<div class="bar" id="catBar"></div>

<!-- PRODUCTS -->
<div id="view"></div>

<!-- ADMIN -->
<div class="admin" id="admin">

<h3>ADMIN PANEL</h3>

<input id="pname" placeholder="Product name">
<input id="price" placeholder="Price">
<select id="category"></select>

<button class="save" onclick="upload()">Upload Images</button>
<button class="save" onclick="saveProduct()">Save Product</button>

<hr>

<h4>Delete Products</h4>
<select id="delCat" onchange="loadAdminProducts()"></select>
<div id="adminList"></div>

<hr>

<h4>Add Category</h4>
<input id="newCat">
<button class="save" onclick="addCategory()">Add</button>

<h4>Delete Category</h4>
<select id="delCat2"></select>
<button class="del" onclick="deleteCategory()">Delete</button>

<hr>

<button class="del" onclick="closeAdmin()">Close</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
addDoc,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyD40daowTCCVrKr1kWI6krf9nB7OHp8mWU",
authDomain: "luxury-heaven-c24df.firebaseapp.com",
projectId: "luxury-heaven-c24df",
storageBucket: "luxury-heaven-c24df.firebasestorage.app",
messagingSenderId: "277279766368",
appId: "1:277279766368:web:2f5858b54f58d1df629005"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* STATE */
let products = [];
let categories = [];
let images = [];
let active = "";

/* ADMIN */
window.openAdmin = ()=>admin.style.display="block";
window.closeAdmin = ()=>admin.style.display="none";

/* LOAD */
window.onload = async ()=>{
await loadCategories();
await loadProducts();
};

/* PRODUCTS */
async function loadProducts(){
const snap = await getDocs(collection(db,"products"));
products = [];
snap.forEach(d=>{
products.push({id:d.id,...d.data()});
});
}

/* CATEGORIES */
async function loadCategories(){

const snap = await getDocs(collection(db,"categories"));

categories = [];

catBar.innerHTML="";
category.innerHTML="";
delCat.innerHTML="";
delCat2.innerHTML="";

snap.forEach(d=>{
let c = d.data().name;
categories.push(c);

/* BUTTON */
let b = document.createElement("div");
b.className="cat";
b.innerText=c;

b.onclick=()=>{
document.querySelectorAll(".cat").forEach(x=>x.classList.remove("active"));
b.classList.add("active");
active=c;
render();
};

catBar.appendChild(b);

/* SELECT */
category.innerHTML+=`<option>${c}</option>`;
delCat.innerHTML+=`<option>${c}</option>`;
delCat2.innerHTML+=`<option>${c}</option>`;
});
}

/* RENDER */
function render(){
view.innerHTML="";

let filtered = products.filter(p =>
(p.category||"").toLowerCase() === (active||"").toLowerCase()
);

filtered.forEach(p=>{
view.innerHTML+=`
<div class="card">
<h3>${p.name}</h3>
<p class="price">₦ ${p.price}</p>
<button class="buy" onclick="buy('${p.name}','${p.price}','${p.images? p.images[0]:''}')">
BUY
</button>
</div>
`;
});
}

/* WHATSAPP */
window.buy = function(name,price,img){

let msg = `Hello 👋,

I want to order this Product:

🛍️ Product: ${name}
💰 Price: ₦${price}

🖼️ Image:
${img}

Is it available?`;

window.open("https://wa.me/2349114738932?text="+encodeURIComponent(msg));
};

/* UPLOAD */
window.upload = function(){
cloudinary.openUploadWidget({
cloudName:"db92r6j9z",
uploadPreset:"ummuhalti",
multiple:true
},(e,r)=>{
if(r.event==="success"){
images.push(r.info.secure_url);
alert("Uploaded ✔");
}
});
};

/* SAVE PRODUCT */
window.saveProduct = async function(){

await addDoc(collection(db,"products"),{
name:pname.value,
price:price.value,
category:category.value,
images:images,
date:Date.now()
});

alert("Saved ✔");

pname.value="";
price.value="";
images=[];

await loadProducts();
};

/* ADMIN LIST */
window.loadAdminProducts = function(){

let c = delCat.value;
adminList.innerHTML="";

products.filter(p=>p.category===c)
.forEach(p=>{
adminList.innerHTML+=`
<div class="item">
${p.name}
<button class="del" onclick="del('${p.id}')">X</button>
</div>
`;
});
};

/* DELETE PRODUCT */
window.del = async function(id){
await deleteDoc(doc(db,"products",id));
alert("Deleted ✔");
await loadProducts();
loadAdminProducts();
};

/* CATEGORY */
window.addCategory = async function(){
await addDoc(collection(db,"categories"),{
name:newCat.value
});
alert("Added ✔");
await loadCategories();
};

window.deleteCategory = async function(){

const snap = await getDocs(collection(db,"categories"));

snap.forEach(async d=>{
if(d.data().name===delCat2.value){
await deleteDoc(doc(db,"categories",d.id));
}
});

alert("Deleted ✔");
await loadCategories();
};

</script>

</body>
</html>
